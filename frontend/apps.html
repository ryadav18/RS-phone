<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installed Apps Directory - RS Phone</title>
    <style>
        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding-bottom: 30px;
        }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .header { 
            border-bottom: 1px solid #333; 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .header h2 { margin: 0; color: #00bcd4; text-transform: uppercase; letter-spacing: 1px; }
        .header p { margin: 5px 0 0 0; color: #aaa; font-size: 0.9em; }
        .back-link { color: #4caf50; text-decoration: none; font-weight: bold; padding: 8px 12px; background: rgba(76, 175, 80, 0.2); border-radius: 4px; }
        .back-link:hover { background: rgba(76, 175, 80, 0.4); }
        
        .search-box {
            width: 100%; padding: 14px; background: #1e1e1e; border: 1px solid #333; color: white; 
            border-radius: 6px; margin-bottom: 20px; font-size: 16px; outline: none; box-sizing: border-box;
        }
        .search-box:focus { border-color: #00bcd4; }

        .stats-bar {
            display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .stat-badge {
            background: #1e1e1e; padding: 8px 15px; border-radius: 20px; font-size: 0.9em; font-weight: bold; border: 1px solid #333; flex: 1; text-align: center;
        }
        .stat-badge.total { color: #00bcd4; border-color: rgba(0, 188, 212, 0.5); }
        .stat-badge.user { color: #2ecc71; border-color: rgba(46, 204, 113, 0.5); }
        .stat-badge.system { color: #e74c3c; border-color: rgba(231, 76, 60, 0.5); }

        .app-list { display: flex; flex-direction: column; gap: 10px; }
        
        .app-card { 
            background: #1e1e1e; padding: 15px; border-radius: 8px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 4px solid #00bcd4; border-right: 1px solid #333; border-top: 1px solid #333; border-bottom: 1px solid #333;
        }
        .app-info { display: flex; flex-direction: column; }
        .app-name { font-size: 1.1em; font-weight: bold; }
        .app-pkg { color: #888; font-size: 0.85em; margin-top: 4px; font-family: monospace; word-break: break-all; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75em; font-weight: bold; text-transform: uppercase; }
        .badge.user-app { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .badge.system-app { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }
        
        #loading-text { color: #888; font-style: italic; text-align: center; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h2>App Directory</h2>
                <p>20-App Burn Cycle: Deletes page locally after reading.</p>
            </div>
            <a href="/dashboard" class="back-link">&larr; Dashboard</a>
        </div>
        
        <div class="stats-bar" id="stats-bar" style="display: none;">
            <div class="stat-badge total" id="stat-total">Total: 0</div>
            <div class="stat-badge user" id="stat-user">User: 0</div>
            <div class="stat-badge system" id="stat-system">System: 0</div>
        </div>

        <input type="text" id="search-input" class="search-box" placeholder="Search current 20 apps by name or package...">

        <div id="apps-container" class="app-list">
            <p id="loading-text">Fetching application registry from database...</p>
        </div>

        <!-- 🚀 NAYA: Pagination Button Container -->
        <div id="pagination-controls"></div>

    </div>

    <script src="/static/js/apps_engine.js"></script>
</body>
</html>
