<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Audit Log - RS OWNER</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 🚀 MASTER VIEWPORT ENGINE: Managed viewport limits smoothly */
        .data-list-container {
            max-height: 72vh;
            overflow-y: auto;
            padding-right: 8px;
            scroll-behavior: smooth;
        }

        /* 💻 CUSTOM ENTERPRISE SCROLLBARS: Replaces ugly default OS sliders */
        .data-list-container::-webkit-scrollbar,
        .chat-viewport-stream::-webkit-scrollbar {
            width: 6px;
        }
        .data-list-container::-webkit-scrollbar-track,
        .chat-viewport-stream::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
        }
        .data-list-container::-webkit-scrollbar-thumb,
        .chat-viewport-stream::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .data-list-container::-webkit-scrollbar-thumb:hover,
        .chat-viewport-stream::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 240, 255, 0.3);
        }

        /* 🚀 PREMIUM CONVERSATION THREAD BOX: Matches the JavaScript factory nodes */
        .sms-card {
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 16px !important; /* Forces layout smoothing rounding paths */
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }
        .sms-card:hover {
            border-color: rgba(0, 240, 255, 0.2);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
        }
        
        /* Standard layout directions class matching variables */
        .direction-received { background: rgba(46, 204, 113, 0.12) !important; color: #2ecc71 !important; }
        .direction-sent { background: rgba(0, 240, 255, 0.12) !important; color: #00f0ff !important; }

        /* Dynamic Chat Window Sub-stream structural fixes */
        .chat-viewport-stream {
            scroll-behavior: smooth;
            padding-right: 4px;
        }

        /* =================================================================================
        /* HIGH-LEVEL UNIFIED PAGINATION CONTROL ENGINE STYLES
        /* ================================================================================= */
        .pagination-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .pagination-btn {
            background: rgba(255, 255, 255, 0.03);
            color: #ffffff;
            border: 1px solid #2c2c2e;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .pagination-btn:hover:not(:disabled) {
            background: rgba(0, 240, 255, 0.08);
            border-color: rgba(0, 240, 255, 0.3);
            color: #00f0ff;
        }
        .pagination-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            background: rgba(0, 0, 0, 0.4);
            border-color: #1a1a1c;
            color: #555;
        }
        .pagination-indicator {
            font-size: 0.85rem;
            color: #8e8e93;
            font-weight: 700;
            letter-spacing: 1px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar glass-panel">
            <div class="sidebar-brand">
                <i data-lucide="shield" style="color: var(--accent-cyan);"></i>
                <span>RS OWNER</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard"><i data-lucide="layout-dashboard"></i> Overview</a></li>
                <li><a href="/permissions"><i data-lucide="shield-check"></i> Permissions</a></li>
                <li><a href="/ops"><i data-lucide="activity"></i> Live Operations</a></li>
                <li><a href="/calls"><i data-lucide="phone"></i> Call Logs</a></li>
                <li class="active"><a href="/messages"><i data-lucide="message-square"></i> SMS Audit</a></li>
                <li><a href="/files"><i data-lucide="folder-open"></i> Storage</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h2 style="font-weight: 700; letter-spacing: 0.5px;">Comm Metadata Log</h2>
                    <p style="color: #666; font-size: 0.85rem; margin-top: 4px;">Displaying Active Thread Matrices Grouped by Identity</p>
                </div>
                <div class="device-switcher" style="display: flex; align-items: center; gap: 15px;">
                    <select id="device-select" style="padding: 8px 12px; border-radius: 6px; background: #1c1c1e; color: white; border: 1px solid #2c2c2e; outline: none; font-weight: 600; font-size: 0.85rem; cursor: pointer;"></select>
                    <button onclick="wipeSMSHistory()" style="background: rgba(255, 59, 48, 0.15); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.3); border-radius: 6px; padding: 8px 16px; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: 0.2s; text-transform: uppercase; font-size: 0.8rem;">
                        <i data-lucide="trash-2" style="width: 14px; height: 14px;"></i> Wipe Logs
                    </button>
                </div>
            </header>

            <div class="glass-panel" style="padding: 25px; border-radius: 16px;">
                <!-- Target container for the dynamic thread cards processed by MessagesEngine -->
                <div class="data-list-container" id="sms-list">
                    <div style="color: #666; text-align: center; padding: 40px; font-weight: 500;">Establishing secure connection to database stream...</div>
                </div>

                <!-- Smart Architecture Pagination Control Shell -->
                <div class="pagination-wrapper">
                    <button class="pagination-btn" id="sms-prev-btn" disabled>
                        <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i> Previous
                    </button>
                    <span class="pagination-indicator" id="sms-page-num">LOADING...</span>
                    <button class="pagination-btn" id="sms-next-btn" disabled>
                        Next <i data-lucide="arrow-right" style="width: 14px; height: 14px;"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/messages_engine.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
