<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Audit Log - RS OWNER</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 🚀 MASTER INTEGRATION BUFFER: Ensures the split canvas renders perfectly across device families */
        .workspace-glass-wrapper {
            padding: 20px; 
            border-radius: 16px; 
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
        }

        .workspace-fluid-container {
            width: 100%;
            height: auto;
            position: relative;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar glass-panel">
            <div class="sidebar-brand">
                <i data-lucide="shield" style="color: var(--accent-cyan);"></i>
                <span>RS OWNER</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard"><i data-lucide="layout-dashboard"></i> Overview</a></li>
                <li><a href="/permissions"><i data-lucide="shield-check"></i> Permissions</a></li>
                <li><a href="/ops"><i data-lucide="activity"></i> Live Operations</a></li>
                <li><a href="/calls"><i data-lucide="phone"></i> Call Logs</a></li>
                <li class="active"><a href="/messages"><i data-lucide="message-square"></i> SMS Audit</a></li>
                <li><a href="/files"><i data-lucide="folder-open"></i> Storage</a></li>
            </ul>
        </div>

        <!-- Main Content Command Workspace -->
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h2 style="font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;">Comm Metadata Log</h2>
                    <p style="color: #666; font-size: 0.85rem; margin-top: 4px;">Displaying Active Thread Matrices Grouped by Identity</p>
                </div>
                <div class="device-switcher" style="display: flex; align-items: center; gap: 15px;">
                    <!-- Hardware Nodes Select Controller Routing Anchor -->
                    <select id="device-select" style="padding: 8px 12px; border-radius: 6px; background: #1c1c1e; color: white; border: 1px solid #2c2c2e; outline: none; font-weight: 600; font-size: 0.85rem; cursor: pointer;"></select>
                    
                    <!-- Secure Database Purge Shield Trigger -->
                    <button onclick="wipeSMSHistory()" style="background: rgba(255, 59, 48, 0.15); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.3); border-radius: 6px; padding: 8px 16px; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; text-transform: uppercase; font-size: 0.8rem;">
                        <i data-lucide="trash-2" style="width: 14px; height: 14px;"></i> Wipe Logs
                    </button>
                </div>
            </header>

            <div class="workspace-glass-wrapper">
                <!-- 📥 TARGET INJECTION ANCHOR: The MessagesEngine instantly mounts the Split Workspace here -->
                <div class="workspace-fluid-container" id="sms-list">
                    <div style="color: #666; text-align: center; padding: 60px; font-weight: 500; font-size: 0.95rem; letter-spacing: 0.5px;">
                        Establishing secure handshake protocol to database stream...
                    </div>
                </div>

                <!-- 🚀 UNIFIED COMPLIANT PAGINATION CONTROLLER GRID SHELL -->
                <div class="pagination-wrapper">
                    <button class="pagination-btn" id="sms-prev-btn" disabled>
                        <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i> Previous
                    </button>
                    <span class="pagination-indicator" id="sms-page-num">INITIALIZING STATES...</span>
                    <button class="pagination-btn" id="sms-next-btn" disabled>
                        Next <i data-lucide="arrow-right" style="width: 14px; height: 14px;"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Core Application Processing Scripts Hierarchy Pipeline -->
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/messages_engine.js"></script>
    <script>
        // Global Vector Graphic Handlers Hook
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        });
    </script>
</body>
</html>
