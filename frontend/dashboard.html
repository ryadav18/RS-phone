<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS COMMAND CENTER</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Bento Grid System */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(150px, auto);
            gap: 20px;
            padding: 20px 0;
        }
        .bento-card { grid-column: span 1; grid-row: span 1; }
        .span-2 { grid-column: span 2; }
        .row-2 { grid-row: span 2; }

        /* Glowing Phone Mockup */
        .phone-mockup {
            width: 80px; height: 160px; border: 2px solid var(--accent-cyan);
            border-radius: 15px; position: relative; margin: 0 auto;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(0, 210, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); } }

        /* Telemetry Elements */
        .metric-val { font-size: 1.5rem; font-weight: bold; color: white; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Minimalist Sidebar -->
        <div class="sidebar glass-panel">
            <div class="sidebar-brand"><i data-lucide="shield" style="color: var(--accent-cyan);"></i></div>
            <ul class="sidebar-menu">
                <li class="active"><a href="/dashboard"><i data-lucide="layout-dashboard"></i></a></li>
                <li><a href="/notifications"><i data-lucide="bell"></i></a></li>
                <li><a href="/calls"><i data-lucide="phone"></i></a></li>
                <li><a href="/messages"><i data-lucide="message-square"></i></a></li>
                <li><a href="/files"><i data-lucide="folder-open"></i></a></li>
                <li><a href="/logs"><i data-lucide="terminal"></i></a></li>
            </ul>
        </div>

        <main class="main-content">
            <header class="topbar">
                <h2>Command Center</h2>
                <select id="device-select" class="glass-panel" style="padding: 10px;"></select>
            </header>

            <div class="bento-grid">
                <!-- 1. Zinda Phone Card -->
                <div class="glass-panel bento-card row-2" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <div class="phone-mockup pulse"><i data-lucide="smartphone"></i></div>
                    <p id="info-name" style="margin-top: 15px; font-weight: bold;">Loading...</p>
                    <span id="online-badge" style="font-size: 0.7rem; color: #30d158;">● ONLINE</span>
                </div>

                <!-- 2. Telemetry Cards -->
                <div class="glass-panel bento-card"><p>Battery</p><div class="metric-val" id="metric-battery">0%</div></div>
                <div class="glass-panel bento-card"><p>Storage</p><div class="metric-val" id="metric-storage">0GB</div></div>
                
                <!-- 3. Navigation Cards -->
                <a href="/notifications" class="glass-panel bento-card span-2 nav-card"><h3>Notifications</h3><p>Real-time stream</p></a>
                <a href="/calls" class="glass-panel bento-card nav-card"><h3>Calls</h3></a>
                <a href="/messages" class="glass-panel bento-card nav-card"><h3>SMS</h3></a>
                
                <!-- 4. System Logs & Others -->
                <a href="/logs" class="glass-panel bento-card span-2 nav-card"><h3>System Logs</h3><p>Audit Trail</p></a>
            </div>
        </main>
    </div>
    <script src="/static/js/dashboard.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
