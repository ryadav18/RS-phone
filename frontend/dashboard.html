<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Phone - Command Center</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Zero-Lag Base Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #121212; padding: 15px; padding-bottom: 40px; color: #ffffff; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { font-size: 22px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #ffffff; }
        .device-selector { width: 100%; padding: 12px; margin-top: 15px; border-radius: 4px; border: 1px solid #333; background: #1e1e1e; color: white; font-size: 16px; outline: none; }

        .card-container { display: flex; flex-direction: column; gap: 12px; }
        
        .flat-card {
            display: flex; flex-direction: column; justify-content: center;
            padding: 22px 20px; border-radius: 4px; color: white; 
            text-decoration: none; position: relative; overflow: hidden;
            border-bottom: 3px solid rgba(0,0,0,0.3);
        }
        
        .card-content { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .card-left { display: flex; align-items: center; gap: 16px; z-index: 2; }
        .card-icon { width: 42px; height: 42px; opacity: 0.9; }
        .card-text { display: flex; flex-direction: column; }
        .card-title { font-size: 18px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-subtitle { font-size: 13px; opacity: 0.8; margin-top: 4px; font-weight: 400; }
        
        .card-right { text-align: right; z-index: 2; }
        .metric-value { font-size: 28px; font-weight: 700; }
        .metric-label { font-size: 12px; opacity: 0.8; text-transform: uppercase; }

        .action-row { display: flex; gap: 10px; margin-top: 15px; width: 100%; z-index: 2; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 4px; font-weight: 600; font-size: 14px; text-transform: uppercase; cursor: pointer; background: rgba(255,255,255,0.2); color: white; transition: background 0.2s; }
        .btn:active { background: rgba(0,0,0,0.3); }

        .bg-icon { position: absolute; right: -20px; top: -10px; width: 120px; height: 120px; opacity: 0.1; z-index: 1; transform: rotate(-15deg); }

        .bg-dark { background-color: #2c3e50; }
        .bg-red { background-color: #e74c3c; }
        .bg-green { background-color: #2ecc71; }
        .bg-blue { background-color: #2980b9; }
        .bg-teal { background-color: #1abc9c; }
        .bg-purple { background-color: #8e44ad; }
        .bg-yellow { background-color: #f39c12; }
        .bg-orange { background-color: #d35400; }
        .bg-pink { background-color: #c0392b; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Command Center</h2>
        <select id="device-select" class="device-selector">
            <option>Loading devices...</option>
        </select>
    </div>

    <div class="card-container">
        <!-- 1. Connection -->
        <div class="flat-card bg-dark">
            <i data-lucide="radio" class="bg-icon"></i>
            <div class="card-content">
                <div class="card-left">
                    <i data-lucide="smartphone" class="card-icon"></i>
                    <div class="card-text">
                        <span class="card-title" id="info-name">Device Name</span>
                        <span class="card-subtitle" id="online-badge">● ONLINE</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. Battery -->
        <div class="flat-card bg-red" id="battery-card">
            <i data-lucide="battery-charging" class="bg-icon"></i>
            <div class="card-content">
                <div class="card-left">
                    <i data-lucide="battery" class="card-icon"></i>
                    <div class="card-text">
                        <span class="card-title">Battery</span>
                        <span class="card-subtitle" id="battery-state">Discharging</span>
                    </div>
                </div>
                <div class="card-right">
                    <div class="metric-value" id="metric-battery">0%</div>
                </div>
            </div>
        </div>

        <!-- 3. Storage -->
        <div class="flat-card bg-purple">
            <i data-lucide="hard-drive" class="bg-icon"></i>
            <div class="card-content">
                <div class="card-left">
                    <i data-lucide="database" class="card-icon"></i>
                    <div class="card-text">
                        <span class="card-title">Storage</span>
                        <span class="card-subtitle">Internal Drive</span>
                    </div>
                </div>
                <div class="card-right">
                    <div class="metric-value" id="metric-storage">0GB</div>
                    <div class="metric-label">Used</div>
                </div>
            </div>
        </div>

        <!-- 4. Security Shield (ID ADDED) -->
        <div class="flat-card bg-pink">
            <i data-lucide="shield-alert" class="bg-icon"></i>
            <div class="card-content">
                <div class="card-left">
                    <i data-lucide="shield" class="card-icon"></i>
                    <div class="card-text">
                        <span class="card-title">Security Shield</span>
                        <span class="card-subtitle" id="metric-shield-status">Admin Protected</span>
                    </div>
                </div>
            </div>
            <div class="action-row">
                <button class="btn" onclick="forceLockDevice()">Force Lock Device</button>
            </div>
        </div>

        <!-- 5. App Usage (ID ADDED) -->
        <div class="flat-card bg-yellow">
            <i data-lucide="activity" class="bg-icon"></i>
            <div class="card-content">
                <div class="card-left">
                    <i data-lucide="pie-chart" class="card-icon"></i>
                    <div class="card-text">
                        <span class="card-title">App Usage</span>
                        <span class="card-subtitle">Screen Time Stats</span>
                    </div>
                </div>
                <div class="card-right">
                    <div class="metric-value" id="metric-app-usage">Active</div>
                </div>
            </div>
        </div>

        <!-- 6. Web Filter (ID ADDED) -->
        <div class="flat-card bg-orange">
            <i data-lucide="globe" class="bg-icon"></i>
            <div class="card-content">
                <div class="card-left">
                    <i data-lucide="eye-off" class="card-icon"></i>
                    <div class="card-text">
                        <span class="card-title">Web Filter</span>
                        <span class="card-subtitle" id="metric-filter-status">Content Block Engine</span>
                    </div>
                </div>
            </div>
            <div class="action-row">
                <button class="btn">Configure Filters</button>
            </div>
        </div>

        <!-- 7. Live Ops -->
        <div class="flat-card bg-teal">
            <i data-lucide="cast" class="bg-icon"></i>
            <div class="card-content">
                <div class="card-left">
                    <i data-lucide="video" class="card-icon"></i>
                    <div class="card-text">
                        <span class="card-title">Live Ops</span>
                        <span class="card-subtitle">Remote Monitoring</span>
                    </div>
                </div>
            </div>
            <div class="action-row">
                <button class="btn" onclick="requestScreenCapture()">Screen</button>
                <button class="btn" onclick="requestAudioSync()">Audio</button>
            </div>
        </div>

        <!-- 8. Notifications -->
        <a href="/notifications" class="flat-card bg-blue">
            <i data-lucide="bell" class="bg-icon"></i>
            <div class="card-content">
                <div class="card-left">
                    <i data-lucide="bell" class="card-icon"></i>
                    <div class="card-text">
                        <span class="card-title">Notifications</span>
                        <span class="card-subtitle">Live Stream</span>
                    </div>
                </div>
                <div class="card-right"><div class="metric-value">></div></div>
            </div>
        </a>
    </div>

    <script> lucide.createIcons(); </script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
