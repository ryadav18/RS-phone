<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storage Catalog - RS OWNER</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        
        body { background-color: var(--bg-dark); }
        
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 15px 0;
        }
        
        .file-item {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 140px;
        }
        
        .file-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border-color: var(--accent-cyan);
        }

        .file-item.blocked {
            opacity: 0.5;
            background: repeating-linear-gradient(
                45deg,
                rgba(30, 41, 59, 1),
                rgba(30, 41, 59, 1) 10px,
                rgba(15, 23, 42, 1) 10px,
                rgba(15, 23, 42, 1) 20px
            );
            border-color: rgba(239, 68, 68, 0.3);
        }

        .file-item.blocked:hover {
            transform: none;
            box-shadow: none;
            border-color: rgba(239, 68, 68, 0.5);
            cursor: not-allowed;
        }

        .file-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }

        .file-item:hover:not(.blocked) .file-icon {
            transform: scale(1.1);
        }

        .file-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .file-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 4px 10px;
            border-radius: 12px;
            width: fit-content;
        }

        .status-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .badge-ready { background: var(--accent-green); color: #000; }
        .badge-blocked { background: var(--accent-red); color: #fff; }
        .badge-cloud { background: var(--accent-cyan); color: #000; }

        .breadcrumb-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            background: var(--bg-card);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .back-btn {
            background: rgba(255,255,255,0.1); border: none; color: white;
            padding: 8px 15px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; gap: 6px; font-weight: 600;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        
        .path-text {
            font-family: 'Courier New', Courier, monospace; font-size: 0.95rem;
            color: var(--accent-cyan); word-break: break-all;
        }
        
        .btn-sync {
            background: linear-gradient(135deg, var(--accent-cyan), #3b82f6);
            color: white; border: none; border-radius: 8px; padding: 10px 20px;
            cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }
        .btn-sync:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 🚀 FIX: Synchronized Navigation Menu with Global Unified Settings Layout -->
        <div class="sidebar glass-panel">
            <div class="sidebar-brand">
                <i data-lucide="shield" style="color: var(--accent-cyan);"></i>
                <span>RS OWNER</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard"><i data-lucide="layout-dashboard"></i> Overview</a></li>
                <li><a href="/permissions"><i data-lucide="shield-check"></i> Permissions</a></li>
                <li><a href="/ops"><i data-lucide="activity"></i> Live Operations</a></li>
                <li><a href="/calls"><i data-lucide="phone"></i> Call Logs</a></li>
                <li><a href="/messages"><i data-lucide="message-square"></i> SMS Audit</a></li>
                <li class="active"><a href="/files"><i data-lucide="folder-open"></i> Storage</a></li>
            </ul>
        </div>
        
        <main class="main-content">
            <header class="topbar">
                <h2 style="font-weight: 700; color: #fff;">File System Explorer</h2>
                <div class="device-switcher" style="display: flex; align-items: center; gap: 15px;">
                    <select id="device-select" style="padding: 8px; border-radius: 6px; background: #1e293b; color: white; border: 1px solid #334155;"></select>
                    <button class="btn-sync" onclick="requestStorageSync()">
                        <i data-lucide="refresh-cw" style="width: 18px; height: 18px;"></i> Deep Scan Device
                    </button>
                </div>
            </header>

            <div style="padding: 20px;">
                <!-- Modern Breadcrumb -->
                <div class="breadcrumb-container" id="path-breadcrumb" style="display: none;">
                    <button class="back-btn" onclick="window.filesEngine.goUp()">
                        <i data-lucide="chevron-left" style="width: 18px; height: 18px;"></i> Back
                    </button>
                    <i data-lucide="hard-drive" style="color: var(--text-muted); width: 20px;"></i>
                    <span class="path-text" id="current-path-text">/</span>
                </div>

                <!-- Main File Grid -->
                <div class="file-grid" id="files-list">
                    <div style="color: var(--text-muted); text-align: center; grid-column: 1 / -1; padding: 60px; font-size: 1.1rem;">
                        <i data-lucide="lock" style="width: 40px; height: 40px; margin-bottom: 15px; opacity: 0.5;"></i><br>
                        Establishing secure tracking tunnel...
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/files_engine.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
