<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synchronized Storage Catalog - RS OWNER</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            padding: 10px;
        }
        .file-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .file-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-cyan);
            transform: translateY(-3px);
        }
        .file-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 10px auto;
            color: var(--accent-cyan);
        }
        .file-name {
            font-size: 0.85rem;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.95rem;
            color: var(--accent-cyan);
        }
        .back-btn {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Upgraded Hub & Spoke Sidebar -->
        <div class="sidebar glass-panel">
            <div class="sidebar-brand">
                <i data-lucide="shield" style="color: var(--accent-cyan);"></i>
                <span>RS OWNER</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard"><i data-lucide="layout-dashboard"></i> Overview</a></li>
                <li><a href="/permissions"><i data-lucide="shield-check"></i> Permissions</a></li>
                <li><a href="/notifications"><i data-lucide="bell"></i> Notifications</a></li>
                <li><a href="/calls"><i data-lucide="phone"></i> Call Logs</a></li>
                <li><a href="/messages"><i data-lucide="message-square"></i> SMS History</a></li>
                <li class="active"><a href="/files"><i data-lucide="folder-open"></i> Storage</a></li>
                <li><a href="/logs"><i data-lucide="terminal"></i> System Logs</a></li>
            </ul>
        </div>
        
        <main class="main-content">
            <header class="topbar">
                <h2 style="font-weight: 700;">Synchronized Files Storage Catalog</h2>
                <div class="device-switcher" style="display: flex; align-items: center; gap: 15px;">
                    <select id="device-select"></select>
                    <button onclick="requestStorageSync()" style="background: var(--accent-cyan); color: #000; border: none; border-radius: 5px; padding: 8px 15px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px;">
                        <i data-lucide="refresh-cw" style="width: 16px; height: 16px;"></i> Sync Storage
                    </button>
                </div>
            </header>

            <!-- Wrapper for Permission Lock -->
            <div class="glass-panel" id="files-wrapper" style="padding: 25px; min-height: 400px;">
                <!-- Breadcrumb Navigation -->
                <div class="breadcrumb" id="path-breadcrumb" style="display: none;">
                    <button class="back-btn" onclick="filesEngine.goUp()"><i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Back</button>
                    <span id="current-path-text">/ Internal Storage</span>
                </div>

                <!-- Main File Grid -->
                <div class="file-grid" id="files-list">
                    <div style="color: #888; text-align: center; grid-column: 1 / -1; padding: 40px;">
                        Verifying security permissions...
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/app.js"></script>
    <!-- Directly linked to our newly upgraded modular engine -->
    <script src="/static/js/files_engine.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
