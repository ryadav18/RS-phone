<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geofence Configuration Boundary</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #121212; color: #fff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h3 { color: #2ecc71; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
        #map { width: 100%; height: 350px; background: #1e1e1e; border-radius: 4px; margin-bottom: 15px; border: 1px solid #333; }
        .control-panel { background: #1e1e1e; padding: 15px; border-radius: 4px; border: 1px solid #333; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; }
        input { width: 100%; padding: 10px; background: #2b2b2b; border: 1px solid #444; border-radius: 4px; color: white; outline: none; }
        .btn-save { width: 100%; padding: 12px; border: none; background: #2ecc71; color: #000; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-back { display: block; text-align: center; margin-top: 15px; color: #aaa; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h3>Geofence Safe Zone Editor</h3>
    <div id="map"></div>
    
    <div class="control-panel">
        <div class="input-group">
            <label>Fence Center Latitude</label>
            <input type="number" id="fence-lat" step="any" readonly>
        </div>
        <div class="input-group">
            <label>Fence Center Longitude</label>
            <input type="number" id="fence-lng" step="any" readonly>
        </div>
        <div class="input-group">
            <label>Perimeter Radius (Meters)</label>
            <input type="number" id="fence-radius" value="500">
        </div>
        <button class="btn-save" onclick="saveGeofenceDataToServer()">Lock Dynamic Perimeter</button>
    </div>
    <a href="/dashboard" class="btn-back">< Return to Command Center</a>
</div>

<script src="/static/js/geofence_engine.js"></script>
</body>
</html>
