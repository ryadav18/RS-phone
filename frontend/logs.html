<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trace Log System - RS OWNER</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .terminal-container {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar with fully updated Hub & Spoke Links -->
        <div class="sidebar glass-panel">
            <div class="sidebar-brand">
                <i data-lucide="shield" style="color: var(--accent-cyan);"></i>
                <span>RS OWNER</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard"><i data-lucide="layout-dashboard"></i> Overview</a></li>
                <li><a href="/permissions"><i data-lucide="shield-check"></i> Permissions</a></li>
                <li><a href="/notifications"><i data-lucide="bell"></i> Notifications</a></li>
                <li><a href="/calls"><i data-lucide="phone"></i> Call Logs</a></li>
                <li><a href="/messages"><i data-lucide="message-square"></i> SMS History</a></li>
                <li><a href="/files"><i data-lucide="folder-open"></i> Storage</a></li>
                <li class="active"><a href="/logs"><i data-lucide="terminal"></i> System Logs</a></li>
            </ul>
        </div>
        <main class="main-content">
            <header class="topbar">
                <h2 style="font-weight: 700;">System Event Audit Trail</h2>
                <div class="device-switcher" style="display: flex; align-items: center; gap: 15px;">
                    <select id="device-select"></select>
                    <!-- Connected to Logs Engine Wipe Function -->
                    <button onclick="wipeSystemLogs()" style="background: #ff3b30; color: white; border: none; border-radius: 5px; padding: 8px 15px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; transition: 0.3s;">
                        <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i> Wipe Logs
                    </button>
                </div>
            </header>

            <div class="glass-panel" style="padding: 25px;">
                <!-- Engine targets this specific ID -->
                <div class="terminal-container" id="logs-list">
                    <div style="color: #888; text-align: center; padding: 20px;">Establishing secure connection...</div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/app.js"></script>
    <!-- Directly linked to the new engine -->
    <script src="/static/js/logs_engine.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
