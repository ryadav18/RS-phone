<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trace Log System - RS OWNER</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* =========================================================
           RS PHONE - ZERO-LAG FLAT ARCHITECTURE (INJECTED STYLE)
           ========================================================= */
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-cyan: #00f0ff;
            --accent-red: #ff3b30;
            --terminal-green: #00ff00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            padding: 15px;
            padding-bottom: 40px;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }

        /* Sidebar & Layout */
        .app-container { display: flex; min-height: 100vh; gap: 20px; }
        .sidebar { width: 260px; background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid #2c2c2e; display: flex; flex-direction: column; gap: 25px; }
        .sidebar-brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 800; letter-spacing: 1px; color: var(--text-main); }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-menu li a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .sidebar-menu li.active a, .sidebar-menu li a:hover { background: rgba(0, 240, 255, 0.08); color: var(--accent-cyan); }
        
        .main-content { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #2c2c2e; }
        .glass-panel { background: var(--bg-card); border: 1px solid #2c2c2e; border-radius: 16px; padding: 25px; }

        /* =========================================================
           TERMINAL SPECIFIC STYLES
           ========================================================= */
        .terminal-container {
            background: #050505;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            max-height: 68vh;
            overflow-y: auto;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* Terminal specific scrollbar */
        .terminal-container::-webkit-scrollbar-track { background: #000; }
        .terminal-container::-webkit-scrollbar-thumb { background: #222; border-radius: 0; }
        .terminal-container::-webkit-scrollbar-thumb:hover { background: var(--terminal-green); }

        .log-entry {
            border-bottom: 1px solid #1a1a1a;
            padding: 12px 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: background 0.2s;
        }
        .log-entry:hover { background: rgba(0, 255, 0, 0.03); }

        .log-time { color: #888; font-size: 0.85rem; font-weight: 600; }
        .log-type { color: var(--accent-cyan); font-weight: bold; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .log-desc { color: var(--terminal-green); font-size: 0.9rem; line-height: 1.4; word-break: break-all; }

        .btn-wipe {
            background: rgba(255, 59, 48, 0.15); 
            color: var(--accent-red); 
            border: 1px solid rgba(255, 59, 48, 0.3); 
            border-radius: 6px; 
            padding: 10px 18px; 
            cursor: pointer; 
            font-weight: 800; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85rem;
        }
        .btn-wipe:hover { background: var(--accent-red); color: white; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 59, 48, 0.3); }
        .btn-wipe:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Unified Navigation -->
        <div class="sidebar">
            <div class="sidebar-brand">
                <i data-lucide="shield" style="color: var(--accent-cyan);"></i>
                <span>RS OWNER</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard"><i data-lucide="layout-dashboard"></i> Overview</a></li>
                <li><a href="/communication.html"><i data-lucide="message-circle"></i> Comm Hub</a></li>
                <li><a href="/remote_center.html"><i data-lucide="cpu"></i> Remote Ops</a></li>
                <li><a href="/safety.html"><i data-lucide="map-pin"></i> Safety & GPS</a></li>
                <li><a href="/policy.html"><i data-lucide="lock"></i> Policy Manager</a></li>
                <li class="active"><a href="/logs"><i data-lucide="terminal"></i> System Logs</a></li>
            </ul>
        </div>
        
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h2 style="font-weight: 800; letter-spacing: 1px; text-transform: uppercase;">System Event Audit Trail</h2>
                    <p style="color: #888; font-size: 0.85rem; margin-top: 4px;">Live tracking of payload executions and framework activities.</p>
                </div>
                <div class="device-switcher" style="display: flex; align-items: center; gap: 15px;">
                    <select id="device-select" style="padding: 10px 14px; border-radius: 6px; background: #1a1a1c; color: white; border: 1px solid #333; outline: none; font-weight: 600; cursor: pointer;"></select>
                    
                    <!-- Connected to Logs Engine Wipe Function -->
                    <button class="btn-wipe" onclick="wipeSystemLogs()">
                        <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i> Wipe Logs
                    </button>
                </div>
            </header>

            <div class="glass-panel">
                <!-- Engine targets this specific ID -->
                <div class="terminal-container" id="logs-list">
                    <div style="color: #555; text-align: center; padding: 40px; font-weight: bold; letter-spacing: 1px;">
                        <i data-lucide="cpu" style="width: 40px; height: 40px; margin-bottom: 15px; opacity: 0.5;"></i><br>
                        ESTABLISHING SECURE CONNECTION...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- EMBEDDED JAVASCRIPT LOGIC -->
    <script>
        class LogsEngine {
            constructor() {
                this.activeDeviceId = localStorage.getItem('active_device_id');
                this.init();
            }

            async init() {
                await this.loadDevicesList();
                if (!this.activeDeviceId) return;
                this.fetchLogs();
                setInterval(() => this.fetchLogs(), 5000);
            }

            // 🚀 INJECTED: Missing logic added to populate dropdown dynamically
            async loadDevicesList() {
                const token = localStorage.getItem('owner_token');
                try {
                    const res = await fetch('/api/devices', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await res.json();

                    if (result.status === 'success') {
                        const selectEl = document.getElementById('device-select');
                        if (selectEl) {
                            selectEl.innerHTML = ''; 
                            if (result.data.length === 0) {
                                selectEl.innerHTML = '<option value="">No Devices Found</option>';
                                return;
                            }
                            result.data.forEach(dev => {
                                const option = document.createElement('option');
                                option.value = dev.id;
                                option.textContent = dev.name;
                                selectEl.appendChild(option);
                            });

                            if (!this.activeDeviceId && result.data.length > 0) {
                                this.activeDeviceId = result.data[0].id;
                                localStorage.setItem('active_device_id', this.activeDeviceId);
                            }
                            selectEl.value = this.activeDeviceId;

                            selectEl.addEventListener('change', (e) => {
                                this.activeDeviceId = e.target.value;
                                localStorage.setItem('active_device_id', this.activeDeviceId);
                                document.getElementById('logs-list').innerHTML = '<div style="color: #555; text-align: center; padding: 40px;">SCANNING NEW TARGET NODE...</div>';
                                this.fetchLogs(); 
                            });
                        }
                    }
                } catch (e) {
                    console.error("Failed to load device list:", e);
                }
            }

            async fetchLogs() {
                const token = localStorage.getItem('owner_token');
                if (!this.activeDeviceId) return;

                try {
                    const res = await fetch(`/api/logs?device_id=${this.activeDeviceId}&limit=150`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await res.json();
                    if (result.status === 'success') {
                        this.renderLogs(result.data);
                    }
                } catch (e) {
                    console.error("System Logs Engine Error:", e);
                }
            }

            renderLogs(logs) {
                const container = document.getElementById('logs-list');
                if (!container) return;

                if (logs.length === 0) {
                    container.innerHTML = '<div style="color: #555; text-align: center; padding: 40px; font-weight: bold;">> NO SYSTEM ACTIVITY RECORDED IN DATABASE.</div>';
                    return;
                }

                container.innerHTML = logs.map(l => `
                    <div class="log-entry">
                        <div class="log-time">[${new Date(l.timestamp).toLocaleString()}]</div>
                        <div class="log-type">>> ${l.event_type}</div>
                        <div class="log-desc">   ${l.description}</div>
                    </div>
                `).join('');
            }
        }

        window.wipeSystemLogs = async function() {
            if(!confirm("CRITICAL WARNING: Are you sure you want to permanently delete all system logs? This action cannot be reversed.")) return;
            const token = localStorage.getItem('owner_token');
            const activeId = localStorage.getItem('active_device_id');
            
            try {
                const res = await fetch('/api/logs/clear', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: activeId })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    alert("System logs wiped cleanly. Storage optimized.");
                    window.location.reload();
                } else {
                    alert("Execution Error: " + result.message);
                }
            } catch (e) {
                console.error("Wipe Action Failed:", e);
                alert("Network communication failure with the host server.");
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            new LogsEngine();
        });
    </script>
</body>
</html>
