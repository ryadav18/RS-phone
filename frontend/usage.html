<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Wellbeing & App Control - RS Phone</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding-bottom: 30px;
        }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .header { 
            border-bottom: 1px solid #333; 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
        }
        .header h2 { margin: 0 0 5px 0; color: #ff9800; text-transform: uppercase; letter-spacing: 0.5px;}
        .header p { margin: 0 0 15px 0; color: #aaa; font-size: 0.9em; }
        .back-link { color: #4caf50; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        
        /* 🚀 NAYA: 7-Day Timeline Tabs */
        .timeline-tabs {
            display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 8px;
        }
        .tab-btn {
            background: #1e1e1e; border: 1px solid #333; color: #aaa; padding: 10px 16px;
            border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.9rem; min-width: 100px;
            text-align: center; transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: #ff9800; color: #000; border-color: #ff9800;
        }
        
        /* Dynamic Insights Counter */
        .total-screen-card {
            background: rgba(255, 152, 0, 0.05); border: 1px dashed #ff9800;
            padding: 20px; border-radius: 6px; margin-bottom: 20px; text-align: center;
        }
        .total-screen-card h3 { font-size: 1.8rem; color: #ff9800; margin-top: 5px; }

        .app-list { display: flex; flex-direction: column; gap: 10px; }
        .app-card { 
            background: #1e1e1e; 
            padding: 15px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-left: 4px solid #ff9800;
            border-right: 1px solid #333; border-top: 1px solid #333; border-bottom: 1px solid #333;
        }
        .app-info { display: flex; flex-direction: column; }
        .app-name { font-size: 1.1em; font-weight: bold; letter-spacing: 0.5px; }
        .app-pkg { color: #888; font-size: 0.8em; margin-top: 2px; font-family: monospace; }
        .app-time { color: #4caf50; font-size: 0.9em; margin-top: 6px; font-weight: bold; }
        
        .block-btn { 
            background: #d32f2f; color: white; border: none; padding: 10px 15px; 
            border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s;
            text-transform: uppercase; font-size: 0.8rem;
        }
        .block-btn:hover { background: #b71c1c; }
        
        #loading-text { color: #888; font-style: italic; text-align: center; padding: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Digital Wellbeing Dashboard</h2>
            <p>7-Day Rolling Telemetry: Track total screen engagement and deploy application restrictions.</p>
            <a href="/dashboard" class="back-link">&larr; Return to Command Center</a>
        </div>

        <!-- 🚀 NAYA: 7-Day Buttons Hook -->
        <div class="timeline-tabs" id="day-tabs-container"></div>

        <!-- 🚀 NAYA: Day Total Card -->
        <div class="total-screen-card">
            <span style="color: #aaa; font-size: 0.85rem; text-transform: uppercase; font-weight: bold;">Total Device Active Screen Time</span>
            <h3 id="day-total-screentime">0 Hours 0 Minutes</h3>
        </div>

        <div class="app-list" id="usage-container">
            <p id="loading-text">Parsing data analytics structure...</p>
        </div>
    </div>

    <script src="/static/js/usage_engine.js"></script>
</body>
</html>
