<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Phone - Safety & Geolocation</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ==================== CORE STYLES ==================== */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #121212; color: #ffffff; padding: 15px; padding-bottom: 40px; }
        
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .back-btn { background: rgba(255,255,255,0.1); border: none; border-radius: 8px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; transition: background 0.2s; text-decoration: none; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .header h2 { font-size: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #00bcd4; }
        .header-desc { font-size: 12px; color: #888; margin-top: 4px; }

        /* ==================== CARD GRID STYLES ==================== */
        .card-container { display: flex; flex-direction: column; gap: 16px; }
        
        .flat-card {
            background-color: #1e1e1e; padding: 22px 20px; border-radius: 6px;
            position: relative; overflow: hidden; border-left: 4px solid #555;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-decoration: none; color: white;
            display: flex; flex-direction: column; justify-content: center;
            transition: transform 0.2s, background 0.2s;
        }
        
        /* Interactive Cards */
        a.flat-card:hover { transform: translateY(-2px); background-color: #242424; }
        a.flat-card:active { transform: translateY(0); }
        
        /* Thematic Color Borders */
        .border-cyan { border-left-color: #00bcd4; }
        .border-emerald { border-left-color: #27ae60; }
        .border-red { border-left-color: #e74c3c; }
        
        .card-content { display: flex; align-items: center; justify-content: space-between; width: 100%; z-index: 2; }
        .card-left { display: flex; align-items: center; gap: 15px; }
        .card-icon { color: #fff; opacity: 0.9; width: 28px; height: 28px; }
        .card-title { font-size: 18px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-subtitle { font-size: 12px; opacity: 0.7; margin-top: 3px; display: block; }
        
        .card-right { text-align: right; }
        .metric-value { font-size: 22px; font-weight: bold; opacity: 0.8; }
        .btn-setup { font-size: 13px; background: rgba(0,0,0,0.3); padding: 8px 14px; border-radius: 4px; font-weight: bold; border: 1px solid #444; color: #fff; text-decoration: none; cursor: pointer; transition: background 0.2s; }
        .btn-setup:hover { background: rgba(0,0,0,0.5); }
        .badge-standby { font-size: 15px; font-weight: 900; color: #fff; letter-spacing: 1px; }
        .badge-alert { font-size: 15px; font-weight: 900; color: #e74c3c; letter-spacing: 1px; animation: blink 1s infinite; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .bg-icon { position: absolute; right: -20px; top: -10px; width: 140px; height: 140px; opacity: 0.05; z-index: 1; transform: rotate(-15deg); }
    </style>
</head>
<body>

    <!-- ================================================================================= -->
    <!-- MASTER NAVIGATION HEADER                                                          -->
    <!-- ================================================================================= -->
    <div class="header">
        <a href="/dashboard" class="back-btn"><i data-lucide="chevron-left"></i></a>
        <div>
            <h2>Safety & Geolocation</h2>
            <div class="header-desc" id="active-device-label">Validating Target Context...</div>
        </div>
    </div>

    <!-- ================================================================================= -->
    <!-- TRACKING & SECURITY METRICS GRID                                                  -->
    <!-- ================================================================================= -->
    <div class="card-container">

        <!-- 1. GPS LOCATION -->
        <a href="/locations" class="flat-card border-cyan">
            <i data-lucide="map" class="bg-icon"></i>
            <div class="card-content">
                <div class="card-left">
                    <i data-lucide="map-pin" class="card-icon"></i>
                    <div>
                        <span class="card-title">GPS Location</span>
                        <span class="card-subtitle">Real-time Device Tracking Matrix</span>
                    </div>
                </div>
                <div class="card-right"><div class="metric-value">></div></div>
            </div>
        </a>

        <!-- 2. GEOFENCE BOUNDARIES -->
        <div class="flat-card border-emerald">
            <i data-lucide="navigation" class="bg-icon"></i>
            <div class="card-content">
                <div class="card-left">
                    <i data-lucide="circle-dot" class="card-icon"></i>
                    <div>
                        <span class="card-title">Geofence Boundaries</span>
                        <span class="card-subtitle">Proximity Violations & Safe Zone Map</span>
                    </div>
                </div>
                <div class="card-right">
                    <a href="/geofence-config" class="btn-setup">SETUP</a>
                </div>
            </div>
        </div>

        <!-- 3. EMERGENCY SOS MONITOR -->
        <div class="flat-card border-red" style="border-left-width: 6px;">
            <i data-lucide="alert-triangle" class="bg-icon"></i>
            <div class="card-content">
                <div class="card-left">
                    <i data-lucide="alert-circle" class="card-icon"></i>
                    <div>
                        <span class="card-title">SOS Critical Monitor</span>
                        <span class="card-subtitle" id="sos-status-label">Monitoring Panic Signals Matrix</span>
                    </div>
                </div>
                <div class="card-right">
                    <div id="metric-sos-badge" class="badge-standby">STANDBY</div>
                </div>
            </div>
        </div>

    </div>

    <!-- ================================================================================= -->
    <!-- JAVASCRIPT ENGINE (Isolated Context & Telemetry Polling)                          -->
    <!-- ================================================================================= -->
    <script>
        // Init Vector Icons
        lucide.createIcons();

        const deviceId = localStorage.getItem('active_device_id');
        const token = localStorage.getItem('owner_token');

        document.addEventListener('DOMContentLoaded', () => {
            const labelEl = document.getElementById('active-device-label');
            
            if (!deviceId) {
                labelEl.innerText = "ERROR: Target Disconnected / Unassigned";
                labelEl.style.color = "#e74c3c";
            } else {
                labelEl.innerText = `Target Context Authorized [ID: ${deviceId.substring(0,6)}...]`;
                checkSOSStatus(); // Perform initial SOS check
            }
        });

        // 🚀 ISOLATED SOS TELEMETRY ENGINE
        async function checkSOSStatus() {
            if (!deviceId) return;
            try {
                const res = await fetch(`/api/sos/monitor?token=${deviceId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                const badge = document.getElementById('metric-sos-badge');
                const label = document.getElementById('sos-status-label');
                
                if (data.status === "success" && data.sos_data && data.sos_data.sos_active) {
                    badge.innerText = "🚨 PANIC";
                    badge.className = "badge-alert";
                    label.innerText = `CRITICAL STATE: Battery ${data.sos_data.battery}% | ${data.sos_data.status}`;
                    label.style.color = "#e74c3c";
                } else {
                    badge.innerText = "STANDBY";
                    badge.className = "badge-standby";
                    label.innerText = "Monitoring Panic Signals Matrix";
                    label.style.color = "#888";
                }
            } catch (e) {
                console.error("SOS Telemetry check failed:", e);
            }
        }

        // Auto-refresh SOS status every 10 seconds on this page
        setInterval(checkSOSStatus, 10000);
    </script>
</body>
</html>
