<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hour Blocker - RS OWNER</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* =========================================================
           RS PHONE - ZERO-LAG FLAT ARCHITECTURE (INJECTED STYLE)
           ========================================================= */
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-cyan: #00f0ff;
            --color-orange: #f39c12;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; padding: 15px; }

        /* Layout */
        .app-container { display: flex; min-height: 100vh; gap: 20px; }
        .sidebar { width: 260px; background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid #2c2c2e; display: flex; flex-direction: column; gap: 25px; }
        .sidebar-brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 800; letter-spacing: 1px; }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-menu li a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .sidebar-menu li.active a { background: rgba(243, 156, 18, 0.08); color: var(--color-orange); }

        .main-content { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .glass-panel { background: var(--bg-card); border: 1px solid #2c2c2e; border-radius: 16px; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; max-width: 600px; margin: auto; }

        /* Blocker Styles */
        .blocker-icon { width: 80px; height: 80px; color: var(--color-orange); margin-bottom: 20px; }
        h2 { text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        p { color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem; line-height: 1.6; }
        
        .btn-toggle { 
            background: var(--color-orange); color: #000; border: none; padding: 16px 40px; 
            border-radius: 8px; font-weight: 800; text-transform: uppercase; cursor: pointer;
            font-size: 1rem; transition: transform 0.2s, background 0.2s;
        }
        .btn-toggle:hover { background: #e67e22; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-brand"><i data-lucide="shield" style="color: var(--color-orange);"></i> <span>RS OWNER</span></div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard"><i data-lucide="layout-dashboard"></i> Overview</a></li>
                <li><a href="/policy.html"><i data-lucide="lock"></i> Policy Manager</a></li>
                <li class="active"><a href="/study-blocker"><i data-lucide="book-open"></i> Study Blocker</a></li>
            </ul>
        </div>
        
        <main class="main-content">
            <div class="glass-panel">
                <i data-lucide="timer" class="blocker-icon"></i>
                <h2>Study Hour Blocker</h2>
                <p>Activate this to restrict social media and gaming engine triggers on the target device. Helps in maintaining focus by locking high-engagement applications.</p>
                <select id="device-select" style="margin-bottom:20px; padding:10px; background:#111; color:white; border:1px solid #333; border-radius:4px;"></select>
                <button class="btn-toggle" id="btn-study-hour" onclick="toggleStudyHourPolicy()">Toggle Restriction Mode</button>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // Device Dropdown
        async function loadDevices() {
            const token = localStorage.getItem('owner_token');
            const res = await fetch('/api/devices', { headers: { 'Authorization': `Bearer ${token}` } });
            const result = await res.json();
            const select = document.getElementById('device-select');
            result.data.forEach(d => {
                let opt = document.createElement('option');
                opt.value = d.id;
                opt.textContent = d.name;
                select.appendChild(opt);
            });
            select.value = localStorage.getItem('active_device_id');
        }
        loadDevices();

        // 🚀 MERGED LOGIC: Study Hour Policy Engine
        function toggleStudyHourPolicy() {
            const deviceId = document.getElementById('device-select').value;
            const btn = document.getElementById('btn-study-hour');
            
            btn.innerText = "Deploying Policy...";
            btn.disabled = true;

            fetch(`/api/settings/toggle-study-hour?token=${deviceId}`, {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                btn.disabled = false;
                btn.innerText = "Toggle Restriction Mode";
                if (data.status === "success") {
                    const stateAlert = data.study_hour_active ? "ENABLED" : "DISABLED";
                    alert(`Study Hour Restriction Management Matrix is now: ${stateAlert}`);
                } else {
                    alert("Database tracking system handshake rejected execution rules.");
                }
            })
            .catch(error => {
                console.error("Policy Transmission Error:", error);
                btn.disabled = false;
                btn.innerText = "Toggle Restriction Mode";
                alert("Server Pipeline Timeout. Action cached locally.");
            });
        }
    </script>
</body>
</html>
