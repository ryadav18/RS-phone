<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Logs - RS OWNER</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg-main: #121212; --bg-card: #1e1e1e; --text-main: #ffffff; --text-muted: #aaaaaa; --accent-cyan: #00f0ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; padding: 15px; }
        .app-container { display: flex; min-height: 100vh; gap: 20px; }
        .sidebar { width: 260px; background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid #2c2c2e; }
        .sidebar-brand { font-size: 18px; font-weight: 800; letter-spacing: 1px; margin-bottom: 25px; color: var(--accent-cyan); }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-menu li a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; border-radius: 8px; }
        .sidebar-menu li.active a { background: rgba(0, 240, 255, 0.08); color: var(--accent-cyan); }
        .main-content { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .glass-panel { background: var(--bg-card); border: 1px solid #2c2c2e; border-radius: 16px; padding: 25px; }
        .call-card { background: #1c1c1e; padding: 16px 20px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; border: 1px solid #2c2c2e; align-items: center; }
        .type-badge { padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-brand"><span>RS OWNER</span></div>
            <ul class="sidebar-menu">
                <li class="active"><a href="/calls">Call Logs</a></li>
                <li><a href="/messages">SMS Audit</a></li>
            </ul>
        </div>
        <main class="main-content">
            <div class="glass-panel">
                <h2 style="margin-bottom: 20px;">Telemetry Call Routing Logs</h2>
                <div id="calls-list">Loading telemetry logs...</div>
            </div>
        </main>
    </div>
    
    <script>
        class CallsEngine {
            constructor() {
                this.activeDeviceId = localStorage.getItem('active_device_id');
                this.init();
            }

            getValidToken() {
                return localStorage.getItem('owner_token') || localStorage.getItem('session_token') || "";
            }

            async init() {
                if (!this.activeDeviceId) {
                    document.getElementById('calls-list').innerHTML = "No active device bound.";
                    return;
                }
                this.fetchCalls();
                setInterval(() => this.fetchCalls(), 10000);
            }

            async fetchCalls() {
                const token = this.getValidToken();
                if (!this.activeDeviceId) return;
                try {
                    const res = await fetch(`/api/calls?device_id=${this.activeDeviceId}&limit=50`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await res.json();
                    if (result.status === 'success') {
                        this.render(result.data || []);
                    }
                } catch (e) { console.error("Sync Exception:", e); }
            }

            // 🚀 SMART ERROR REPORTER UI INJECTED HERE
            render(data) {
                const container = document.getElementById('calls-list');
                if (data.length === 0) { container.innerHTML = "No logs yet."; return; }
                
                container.innerHTML = data.map(c => {
                    // Agar type ERROR hai, toh laal rang me alert card banayega
                    const isError = c.type === 'ERROR';
                    const numberColor = isError ? '#ff3b30' : 'var(--text-main)';
                    const badgeStyle = isError ? 'background: #ff3b30; color: white;' : 'background: rgba(255,255,255,0.1);';
                    const borderStyle = isError ? 'border-left: 4px solid #ff3b30;' : 'border-left: 1px solid #2c2c2e;';

                    return `
                    <div class="call-card" style="${borderStyle}">
                        <div>
                            <strong style="color: ${numberColor}">${c.number || 'Unknown Identity'}</strong><br>
                            <small style="color: var(--text-muted);">Duration: ${c.duration || 0} sec</small>
                        </div>
                        <div class="type-badge" style="${badgeStyle}">${c.type}</div>
                    </div>`;
                }).join('');
            }
        }
        document.addEventListener('DOMContentLoaded', () => new CallsEngine());
    </script>
</body>
</html>
