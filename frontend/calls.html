<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Logs - RS OWNER</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .data-list-container {
            max-height: 68vh;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        /* 🚀 SMART ARCHITECTURE: Dynamic Identification Border Rules */
        .call-card {
            background: rgba(255,255,255,0.03); 
            padding: 16px; 
            border-radius: 6px; 
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #222;
            transition: transform 0.2s ease, border-color 0.2s;
        }
        .call-card:hover { transform: translateX(3px); }
        
        /* Visual Indicators for Parental Insights */
        .call-card.saved-contact { border-left: 5px solid #2ecc71; }
        .call-card.unknown-contact { border-left: 5px solid #e74c3c; }

        .call-meta-left { display: flex; align-items: center; gap: 14px; }
        .call-icon-frame { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); }
        
        .call-details { display: flex; flex-direction: column; gap: 3px; }
        .contact-identity { font-size: 16px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 8px; }
        .phone-raw-number { font-size: 13px; color: #888; font-family: monospace; }
        
        .badge-identity { padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .badge-saved { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid #2ecc71; }
        .badge-unknown { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid #e74c3c; }

        .call-meta-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        .badge-call-type { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .type-incoming { background: rgba(52, 152, 219, 0.2); color: #3498db; }
        .type-outgoing { background: rgba(155, 89, 182, 0.2); color: #9b59b6; }
        .type-missed { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }

        .call-time-string { font-size: 12px; color: #666; font-weight: 500; }

        /* =================================================================================
        /* 🚀 NEW PRODUCTION STYLING: High-Level Responsive Pagination Navigation Wrapper
        /* ================================================================================= */
        .pagination-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .pagination-btn {
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            border: 1px solid #2c2c2e;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .pagination-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: #444;
        }
        .pagination-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: rgba(0, 0, 0, 0.2);
            border-color: #222;
        }
        .pagination-indicator {
            font-size: 0.9rem;
            color: #8e8e93;
            font-weight: 600;
            letter-spacing: 0.5px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Unified Navigation -->
        <div class="sidebar glass-panel">
            <div class="sidebar-brand">
                <i data-lucide="shield" style="color: var(--accent-cyan);"></i>
                <span>RS OWNER</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard"><i data-lucide="layout-dashboard"></i> Overview</a></li>
                <li><a href="/permissions"><i data-lucide="shield-check"></i> Permissions</a></li>
                <li><a href="/ops"><i data-lucide="activity"></i> Live Operations</a></li>
                <li class="active"><a href="/calls"><i data-lucide="phone"></i> Call Logs</a></li>
                <li><a href="/messages"><i data-lucide="message-square"></i> SMS Audit</a></li>
                <li><a href="/files"><i data-lucide="folder-open"></i> Storage</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h2 style="font-weight: 700;">Secure Telephony Monitoring</h2>
                    <p style="color: #888; font-size: 0.85rem; margin-top: 4px;">Real-time call routing analysis & interception logs.</p>
                </div>
                <div class="device-switcher" style="display: flex; align-items: center; gap: 15px;">
                    <select id="device-select" style="padding: 8px; border-radius: 4px; background: #1e1e1e; color: white; border: 1px solid #333; outline: none; font-weight: bold;"></select>
                    <button onclick="wipeCallsHistory()" style="background: #ff3b30; color: white; border: none; border-radius: 5px; padding: 8px 15px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; transition: 0.3s; text-transform: uppercase; font-size: 0.8rem;">
                        <i data-lucide="trash-2" style="width: 14px; height: 14px;"></i> Wipe Logs
                    </button>
                </div>
            </header>

            <div class="glass-panel" style="padding: 25px;">
                <!-- Target container where the dynamic 10-sliced items per page will inject -->
                <div class="data-list-container" id="calls-list">
                    <div style="color: #888; text-align: center; padding: 20px;">Fetching encrypted telephony data...</div>
                </div>

                <!-- 🚀 NEW INTERFACE ELEMENT: Smart Architecture Pagination Control Shell -->
                <div class="pagination-wrapper">
                    <button class="pagination-btn" id="call-prev-btn" disabled>
                        <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i> Previous
                    </button>
                    <span class="pagination-indicator" id="call-page-num">PAGE 1 OF 5</span>
                    <button class="pagination-btn" id="call-next-btn" disabled>
                        Next <i data-lucide="arrow-right" style="width: 14px; height: 14px;"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/calls_engine.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
