<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Logs - RS OWNER</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg-main: #0d1117; 
            --bg-card: #161b22; 
            --text-main: #e6edf3; 
            --text-muted: #8b949e; 
            --accent-cyan: #2f81f7;
            --border-color: #30363d;
        }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: #484f58; border-radius: 4px; }
        .glass-panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .table-row-hover:hover { background-color: rgba(47, 129, 247, 0.05); }
        .badge { @apply px-2.5 py-1 rounded-full text-xs font-semibold uppercase tracking-wider flex items-center gap-1 w-max; }
        .badge-incoming { background: rgba(46, 160, 67, 0.15); color: #3fb950; border: 1px solid rgba(46, 160, 67, 0.4); }
        .badge-outgoing { background: rgba(47, 129, 247, 0.15); color: #58a6ff; border: 1px solid rgba(47, 129, 247, 0.4); }
        .badge-missed { background: rgba(248, 81, 73, 0.15); color: #f85149; border: 1px solid rgba(248, 81, 73, 0.4); }
        .badge-error { background: rgba(248, 81, 73, 0.2); color: #ff7b72; border: 1px solid #f85149; font-weight: bold; }
        
        /* Toast Notification Styling */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 50; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; opacity: 0; transform: translateX(100%); transition: all 0.3s ease; display: flex; align-items: center; gap: 10px; }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast-success { background: rgba(46, 160, 67, 0.9); color: white; border: 1px solid #3fb950; }
        .toast-info { background: rgba(47, 129, 247, 0.9); color: white; border: 1px solid #58a6ff; }
        .toast-error { background: rgba(248, 81, 73, 0.9); color: white; border: 1px solid #f85149; }
    </style>
</head>
<body class="p-4 md:p-6 flex flex-col md:flex-row gap-6">

    <div id="toast-container"></div>
    
    <!-- Sidebar -->
    <aside class="w-full md:w-64 flex-shrink-0">
        <div class="glass-panel p-5 h-full">
            <div class="flex items-center gap-2 mb-8 text-[var(--accent-cyan)] font-bold text-lg tracking-wide">
                <i data-lucide="shield-check"></i> RS OWNER
            </div>
            <nav class="flex flex-col gap-2">
                <a href="/calls" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-[rgba(47,129,247,0.1)] text-[var(--accent-cyan)] font-medium transition-colors">
                    <i data-lucide="phone" class="w-5 h-5"></i> Call Logs
                </a>
                <a href="/messages" class="flex items-center gap-3 px-4 py-3 rounded-lg text-[var(--text-muted)] hover:bg-[rgba(255,255,255,0.05)] hover:text-white transition-colors">
                    <i data-lucide="message-square" class="w-5 h-5"></i> SMS Audit
                </a>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 min-w-0">
        <div class="glass-panel p-6">
            
            <!-- Header Section -->
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-xl font-bold text-white flex items-center gap-2">
                        <i data-lucide="history" class="w-5 h-5 text-[var(--accent-cyan)]"></i>
                        Call Routing Matrix
                    </h2>
                    <p class="text-sm text-[var(--text-muted)] mt-1">On-demand synchronization with target device.</p>
                </div>
                <!-- 🚀 UPDATED BUTTON -->
                <button onclick="engine.triggerDeviceSync()" id="sync-btn" class="flex items-center gap-2 px-4 py-2 rounded-md bg-[rgba(47,129,247,0.1)] hover:bg-[rgba(47,129,247,0.2)] text-[var(--accent-cyan)] border border-[var(--accent-cyan)] transition-colors font-medium text-sm">
                    <i data-lucide="download-cloud" id="sync-icon" class="w-4 h-4"></i>
                    <span>Fetch From Phone</span>
                </button>
            </div>

            <div id="error-container" class="hidden mb-6 p-4 rounded-lg bg-[rgba(248,81,73,0.1)] border border-[#f85149]">
                <div class="flex items-start gap-3">
                    <i data-lucide="alert-triangle" class="w-5 h-5 text-[#f85149] mt-0.5"></i>
                    <div>
                        <h4 class="font-bold text-[#ff7b72]">System Exception</h4>
                        <p id="error-message" class="text-sm text-[#ff7b72] mt-1 font-mono break-all"></p>
                    </div>
                </div>
            </div>

            <!-- Data Table -->
            <div class="overflow-x-auto rounded-lg border border-[var(--border-color)]">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-[rgba(255,255,255,0.02)] text-[var(--text-muted)] text-sm uppercase tracking-wider border-b border-[var(--border-color)]">
                            <th class="py-4 px-6 font-medium">Type</th>
                            <th class="py-4 px-6 font-medium">Contact / Number</th>
                            <th class="py-4 px-6 font-medium">Duration</th>
                            <th class="py-4 px-6 font-medium">Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="calls-list" class="divide-y divide-[var(--border-color)] text-sm">
                        <tr>
                            <td colspan="4" class="py-12 text-center text-[var(--text-muted)]">
                                <div class="flex flex-col items-center justify-center gap-3">
                                    <i data-lucide="loader-2" class="w-6 h-6 animate-spin text-[var(--accent-cyan)]"></i>
                                    Loading database records...
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        class CallsEngine {
            constructor() {
                this.activeDeviceId = localStorage.getItem('active_device_id');
                this.init();
            }

            getValidToken() { return localStorage.getItem('owner_token') || localStorage.getItem('session_token') || ""; }

            showToast(message, type = 'info') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                
                let icon = 'info';
                if(type === 'success') icon = 'check-circle';
                if(type === 'error') icon = 'alert-octagon';
                
                toast.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i> ${message}`;
                container.appendChild(toast);
                lucide.createIcons();
                
                setTimeout(() => toast.classList.add('show'), 10);
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            }

            async init() {
                if (!this.activeDeviceId) {
                    this.showError("No active device bound.");
                    return;
                }
                await this.fetchCalls();
            }

            // 🚀 THE NEW TRIGGER FUNCTION
            async triggerDeviceSync() {
                const btn = document.getElementById('sync-btn');
                const icon = document.getElementById('sync-icon');
                const token = this.getValidToken();

                if (!this.activeDeviceId) return;

                // UI Loading state
                btn.disabled = true;
                btn.classList.add('opacity-50');
                icon.setAttribute('data-lucide', 'loader-2');
                icon.classList.add('animate-spin');
                lucide.createIcons();

                try {
                    // 1. Send Command to Python API
                    const res = await fetch('/api/calls/trigger', {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ device_id: this.activeDeviceId })
                    });
                    
                    const result = await res.json();
                    
                    if(result.status === 'success') {
                        this.showToast("Command sent! Waiting for device to upload data...", "info");
                        
                        // 2. Wait 7 seconds for the phone to process and push data
                        setTimeout(() => {
                            this.fetchCalls().then(() => {
                                this.showToast("Data refreshed from device!", "success");
                            }).finally(() => this.resetButton(btn, icon));
                        }, 7000);
                        
                    } else {
                        this.showToast(`Error: ${result.message}`, "error");
                        this.resetButton(btn, icon);
                    }
                } catch (e) {
                    this.showToast("Network Error: Could not reach server", "error");
                    this.resetButton(btn, icon);
                }
            }

            resetButton(btn, icon) {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                icon.setAttribute('data-lucide', 'download-cloud');
                icon.classList.remove('animate-spin');
                lucide.createIcons();
            }

            showError(msg) {
                const container = document.getElementById('error-container');
                document.getElementById('error-message').innerText = msg;
                container.classList.remove('hidden');
                document.getElementById('calls-list').innerHTML = `<tr><td colspan="4" class="py-8 text-center text-[var(--text-muted)]">Data fetch aborted.</td></tr>`;
            }

            hideError() { document.getElementById('error-container').classList.add('hidden'); }

            formatDuration(seconds) {
                if (!seconds || seconds === 0) return "0s";
                const m = Math.floor(seconds / 60), s = seconds % 60;
                return (m > 0 && s > 0) ? `${m}m ${s}s` : (m > 0 ? `${m}m` : `${s}s`);
            }

            formatDate(isoString) {
                try {
                    const date = new Date(isoString);
                    if (isNaN(date)) return "Unknown Time";
                    return new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }).format(date);
                } catch(e) { return "Invalid Date"; }
            }

            async fetchCalls() {
                const token = this.getValidToken();
                try {
                    const res = await fetch(`/api/calls?device_id=${this.activeDeviceId}&limit=50`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await res.json();
                    
                    if (res.status === 500) { this.showError(`Backend Server Error (500)`); return; }
                    
                    if (result.status === 'success') {
                        this.hideError();
                        this.render(result.data || []);
                    } else {
                        this.showError(`API Error: ${result.message}`);
                    }
                } catch (e) { this.showError(`Network Error: ${e.message}`); }
            }

            render(data) {
                const container = document.getElementById('calls-list');
                if (data.length === 0) { 
                    container.innerHTML = `<tr><td colspan="4" class="py-12 text-center text-[var(--text-muted)] flex flex-col items-center gap-2"><i data-lucide="inbox" class="w-8 h-8 opacity-50"></i>No telemetry records found.</td></tr>`;
                    lucide.createIcons();
                    return; 
                }
                
                container.innerHTML = data.map(c => {
                    const isError = c.type === 'ERROR';
                    const safeNumber = c.number || 'Unknown Number';
                    const safeName = c.contact_name && c.contact_name !== "Unknown" ? c.contact_name : null;
                    
                    let badgeHtml = '';
                    switch(c.type?.toUpperCase()) {
                        case 'INCOMING': badgeHtml = `<span class="badge badge-incoming"><i data-lucide="arrow-down-left" class="w-3 h-3"></i> Incoming</span>`; break;
                        case 'OUTGOING': badgeHtml = `<span class="badge badge-outgoing"><i data-lucide="arrow-up-right" class="w-3 h-3"></i> Outgoing</span>`; break;
                        case 'MISSED': badgeHtml = `<span class="badge badge-missed"><i data-lucide="phone-missed" class="w-3 h-3"></i> Missed</span>`; break;
                        case 'REJECTED': badgeHtml = `<span class="badge badge-missed"><i data-lucide="phone-off" class="w-3 h-3"></i> Rejected</span>`; break;
                        case 'ERROR': badgeHtml = `<span class="badge badge-error"><i data-lucide="siren" class="w-3 h-3"></i> SYSTEM ERROR</span>`; break;
                        default: badgeHtml = `<span class="badge bg-gray-800 text-gray-300 border border-gray-600">${c.type || 'UNKNOWN'}</span>`;
                    }

                    return `
                    <tr class="table-row-hover transition-colors ${isError ? 'bg-[rgba(248,81,73,0.05)]' : ''}">
                        <td class="py-4 px-6 whitespace-nowrap">${badgeHtml}</td>
                        <td class="py-4 px-6">
                            <div class="flex flex-col">
                                ${safeName ? `<span class="font-semibold text-white">${safeName}</span>` : ''}
                                <span class="${safeName ? 'text-[var(--text-muted)] text-xs mt-0.5' : 'font-semibold text-white'}">${safeNumber}</span>
                            </div>
                        </td>
                        <td class="py-4 px-6 whitespace-nowrap text-[var(--text-muted)]">${isError ? '---' : this.formatDuration(c.duration)}</td>
                        <td class="py-4 px-6 whitespace-nowrap text-[var(--text-muted)] text-xs font-mono">${this.formatDate(c.timestamp)}</td>
                    </tr>`;
                }).join('');
                lucide.createIcons();
            }
        }
        const engine = new CallsEngine();
    </script>
</body>
</html>
