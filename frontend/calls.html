<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Logs - RS OWNER</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 🚀 MASTER VIEWPORT ENGINE: Managed scroll limits strictly inside the command tower */
        .data-list-container {
            max-height: 72vh;
            overflow-y: auto;
            padding-right: 8px;
            scroll-behavior: smooth;
        }
        
        /* 💻 CUSTOM ENTERPRISE SCROLLBARS: Matches premium system specifications */
        .data-list-container::-webkit-scrollbar {
            width: 6px;
        }
        .data-list-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
        }
        .data-list-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .data-list-container::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 240, 255, 0.3);
        }
        
        /* 🚀 TELEPHONY ANALYSIS PANELS: Responsive card rendering modules */
        .call-card {
            background: #1c1c1e; 
            padding: 16px 20px; 
            border-radius: 12px !important; 
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #2c2c2e;
            transition: border-color 0.25s ease, transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s ease;
        }
        .call-card:hover { 
            transform: translateX(4px); 
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }
        
        /* Absolute Classification Tracking Guards */
        .call-card.saved-contact { border-left: 5px solid #2ecc71 !important; }
        .call-card.unknown-contact { border-left: 5px solid #ff3b30 !important; }

        .call-meta-left { display: flex; align-items: center; gap: 16px; }
        
        .call-icon-frame { 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: rgba(255, 255, 255, 0.04); 
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .call-details { display: flex; flex-direction: column; gap: 4px; }
        .contact-identity { font-size: 15px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; letter-spacing: 0.3px; }
        .phone-raw-number { font-size: 12px; color: #666; font-family: monospace; letter-spacing: 0.5px; }
        
        .badge-identity { padding: 3px 8px; border-radius: 20px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-saved { background: rgba(46, 204, 113, 0.12); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.2); }
        .badge-unknown { background: rgba(255, 59, 48, 0.12); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.2); }

        .call-meta-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
        .badge-call-type { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
        
        .type-incoming { background: rgba(52, 152, 219, 0.12); color: #3498db; border: 1px solid rgba(52, 152, 219, 0.2); }
        .type-outgoing { background: rgba(155, 89, 182, 0.12); color: #9b59b6; border: 1px solid rgba(155, 89, 182, 0.2); }
        .type-missed { background: rgba(255, 59, 48, 0.15); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.25); font-weight: 800; }

        .call-time-string { font-size: 11px; color: #555558; font-weight: 600; font-family: monospace; }

        /* =================================================================================
        /* HIGH-LEVEL RESPONSIVE PAGINATION CONTROLS
        /* ================================================================================= */
        .pagination-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .pagination-btn {
            background: rgba(255, 255, 255, 0.03);
            color: #ffffff;
            border: 1px solid #2c2c2e;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .pagination-btn:hover:not(:disabled) {
            background: rgba(0, 240, 255, 0.08);
            border-color: rgba(0, 240, 255, 0.3);
            color: #00f0ff;
        }
        .pagination-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            background: rgba(0, 0, 0, 0.4);
            border-color: #1a1a1c;
            color: #555;
        }
        .pagination-indicator {
            font-size: 0.85rem;
            color: #8e8e93;
            font-weight: 700;
            letter-spacing: 1px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Unified Navigation -->
        <div class="sidebar glass-panel">
            <div class="sidebar-brand">
                <i data-lucide="shield" style="color: var(--accent-cyan);"></i>
                <span>RS OWNER</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard"><i data-lucide="layout-dashboard"></i> Overview</a></li>
                <li><a href="/permissions"><i data-lucide="shield-check"></i> Permissions</a></li>
                <li><a href="/ops"><i data-lucide="activity"></i> Live Operations</a></li>
                <li class="active"><a href="/calls"><i data-lucide="phone"></i> Call Logs</a></li>
                <li><a href="/messages"><i data-lucide="message-square"></i> SMS Audit</a></li>
                <li><a href="/files"><i data-lucide="folder-open"></i> Storage</a></li>
            </ul>
        </div>

        <!-- Main Content Core Viewspace -->
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h2 style="font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;">Secure Telephony Monitoring</h2>
                    <p style="color: #666; font-size: 0.85rem; margin-top: 4px;">Real-time call routing analysis & interception logs.</p>
                </div>
                <div class="device-switcher" style="display: flex; align-items: center; gap: 15px;">
                    <!-- Hardware Switching Matrix Interface Link -->
                    <select id="device-select" style="padding: 8px 12px; border-radius: 6px; background: #1c1c1e; color: white; border: 1px solid #2c2c2e; outline: none; font-weight: 600; font-size: 0.85rem; cursor: pointer;"></select>
                    
                    <!-- Secure Clear Logs Execution Target Anchor -->
                    <button onclick="wipeCallsHistory()" style="background: rgba(255, 59, 48, 0.15); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.3); border-radius: 6px; padding: 8px 16px; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; text-transform: uppercase; font-size: 0.8rem;">
                        <i data-lucide="trash-2" style="width: 14px; height: 14px;"></i> Wipe Logs
                    </button>
                </div>
            </header>

            <div class="glass-panel" style="padding: 25px; border-radius: 16px;">
                <!-- Target injection container node where CallsEngine injects dynamic list cards -->
                <div class="data-list-container" id="calls-list">
                    <div style="color: #666; text-align: center; padding: 40px; font-weight: 500; font-size: 0.95rem; letter-spacing: 0.5px;">
                        Establishing secure handshake connection to telephony grid...
                    </div>
                </div>

                <!-- Smart Pagination Controller Shell Block -->
                <div class="pagination-wrapper">
                    <button class="pagination-btn" id="call-prev-btn" disabled>
                        <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i> Previous
                    </button>
                    <span class="pagination-indicator" id="call-page-num">LOADING BUFFER...</span>
                    <button class="pagination-btn" id="call-next-btn" disabled>
                        Next <i data-lucide="arrow-right" style="width: 14px; height: 14px;"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Integration Core Scripts Dependency Chain -->
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/calls_engine.js"></script>
    <script>
        // Mount dynamic vector graphic handlers cleanly on page boot lifecycle
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        });
    </script>
</body>
</html>
