<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Logs - RS OWNER</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg-main: #0d1117; 
            --bg-card: #161b22; 
            --text-main: #e6edf3; 
            --text-muted: #8b949e; 
            --accent-cyan: #2f81f7;
            --border-color: #30363d;
        }
        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            min-height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: #484f58; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b949e; }

        .glass-panel { 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .table-row-hover:hover { background-color: rgba(47, 129, 247, 0.05); }
        
        /* Status Badges */
        .badge { @apply px-2.5 py-1 rounded-full text-xs font-semibold uppercase tracking-wider flex items-center gap-1 w-max; }
        .badge-incoming { background: rgba(46, 160, 67, 0.15); color: #3fb950; border: 1px solid rgba(46, 160, 67, 0.4); }
        .badge-outgoing { background: rgba(47, 129, 247, 0.15); color: #58a6ff; border: 1px solid rgba(47, 129, 247, 0.4); }
        .badge-missed { background: rgba(248, 81, 73, 0.15); color: #f85149; border: 1px solid rgba(248, 81, 73, 0.4); }
        .badge-error { background: rgba(248, 81, 73, 0.2); color: #ff7b72; border: 1px solid #f85149; font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-6 flex flex-col md:flex-row gap-6">
    
    <!-- Sidebar -->
    <aside class="w-full md:w-64 flex-shrink-0">
        <div class="glass-panel p-5 h-full">
            <div class="flex items-center gap-2 mb-8 text-[var(--accent-cyan)] font-bold text-lg tracking-wide">
                <i data-lucide="shield-check"></i> RS OWNER
            </div>
            <nav class="flex flex-col gap-2">
                <a href="/calls" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-[rgba(47,129,247,0.1)] text-[var(--accent-cyan)] font-medium transition-colors">
                    <i data-lucide="phone" class="w-5 h-5"></i> Call Logs
                </a>
                <a href="/messages" class="flex items-center gap-3 px-4 py-3 rounded-lg text-[var(--text-muted)] hover:bg-[rgba(255,255,255,0.05)] hover:text-white transition-colors">
                    <i data-lucide="message-square" class="w-5 h-5"></i> SMS Audit
                </a>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 min-w-0">
        <div class="glass-panel p-6">
            
            <!-- Header Section -->
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-xl font-bold text-white flex items-center gap-2">
                        <i data-lucide="history" class="w-5 h-5 text-[var(--accent-cyan)]"></i>
                        Telemetry Call Routing Logs
                    </h2>
                    <p class="text-sm text-[var(--text-muted)] mt-1">Real-time synchronized call history matrix.</p>
                </div>
                <button onclick="engine.forceRefresh()" class="p-2 rounded-md bg-[rgba(255,255,255,0.05)] hover:bg-[rgba(255,255,255,0.1)] border border-[var(--border-color)] transition-colors" title="Force Sync">
                    <i data-lucide="refresh-cw" class="w-5 h-5 text-gray-300"></i>
                </button>
            </div>

            <!-- 🚨 Error Display Container (Hidden by default) -->
            <div id="error-container" class="hidden mb-6 p-4 rounded-lg bg-[rgba(248,81,73,0.1)] border border-[#f85149]">
                <div class="flex items-start gap-3">
                    <i data-lucide="alert-triangle" class="w-5 h-5 text-[#f85149] mt-0.5"></i>
                    <div>
                        <h4 class="font-bold text-[#ff7b72]">System Exception Intercepted</h4>
                        <p id="error-message" class="text-sm text-[#ff7b72] mt-1 font-mono break-all"></p>
                    </div>
                </div>
            </div>

            <!-- Data Table -->
            <div class="overflow-x-auto rounded-lg border border-[var(--border-color)]">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-[rgba(255,255,255,0.02)] text-[var(--text-muted)] text-sm uppercase tracking-wider border-b border-[var(--border-color)]">
                            <th class="py-4 px-6 font-medium">Type</th>
                            <th class="py-4 px-6 font-medium">Contact / Number</th>
                            <th class="py-4 px-6 font-medium">Duration</th>
                            <th class="py-4 px-6 font-medium">Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="calls-list" class="divide-y divide-[var(--border-color)] text-sm">
                        <!-- Loading State -->
                        <tr>
                            <td colspan="4" class="py-12 text-center text-[var(--text-muted)]">
                                <div class="flex flex-col items-center justify-center gap-3">
                                    <i data-lucide="loader-2" class="w-6 h-6 animate-spin text-[var(--accent-cyan)]"></i>
                                    Establishing secure connection...
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
        </div>
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        class CallsEngine {
            constructor() {
                this.activeDeviceId = localStorage.getItem('active_device_id');
                this.init();
            }

            getValidToken() {
                return localStorage.getItem('owner_token') || localStorage.getItem('session_token') || "";
            }

            async init() {
                if (!this.activeDeviceId) {
                    this.showError("No active device bound. Please select a device from the Command Center.");
                    return;
                }
                await this.fetchCalls();
                this.syncInterval = setInterval(() => this.fetchCalls(), 10000);
            }

            forceRefresh() {
                const btn = document.querySelector('.lucide-refresh-cw');
                btn.classList.add('animate-spin');
                this.fetchCalls().finally(() => setTimeout(() => btn.classList.remove('animate-spin'), 500));
            }

            showError(msg) {
                const container = document.getElementById('error-container');
                const msgEl = document.getElementById('error-message');
                msgEl.innerText = msg;
                container.classList.remove('hidden');
                
                // Hide table loading state if error happens on initial load
                const list = document.getElementById('calls-list');
                if (list.innerHTML.includes('Establishing secure connection')) {
                     list.innerHTML = `<tr><td colspan="4" class="py-8 text-center text-[var(--text-muted)]">Data fetch aborted due to error.</td></tr>`;
                }
            }

            hideError() {
                document.getElementById('error-container').classList.add('hidden');
            }

            formatDuration(seconds) {
                if (seconds === 0 || !seconds) return "0s";
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                if (m > 0 && s > 0) return `${m}m ${s}s`;
                if (m > 0) return `${m}m`;
                return `${s}s`;
            }

            formatDate(isoString) {
                try {
                    const date = new Date(isoString);
                    if (isNaN(date)) return "Unknown Time";
                    return new Intl.DateTimeFormat('en-US', {
                        month: 'short', day: 'numeric',
                        hour: '2-digit', minute: '2-digit', second: '2-digit',
                        hour12: true
                    }).format(date);
                } catch(e) { return "Invalid Date"; }
            }

            async fetchCalls() {
                const token = this.getValidToken();
                if (!this.activeDeviceId) return;
                
                try {
                    const res = await fetch(`/api/calls?device_id=${this.activeDeviceId}&limit=50`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    const result = await res.json();
                    
                    if (res.status === 500) {
                        this.showError(`Backend Server Error (500): ${result.message || "Internal Exception Occurred"}`);
                        return;
                    }

                    if (result.status === 'success') {
                        this.hideError();
                        this.render(result.data || []);
                    } else {
                        this.showError(`API Error: ${result.message}`);
                    }
                } catch (e) { 
                    console.error("Sync Exception:", e); 
                    this.showError(`Network/Client Error: ${e.message}`);
                }
            }

            render(data) {
                const container = document.getElementById('calls-list');
                
                if (data.length === 0) { 
                    container.innerHTML = `<tr><td colspan="4" class="py-12 text-center text-[var(--text-muted)] flex flex-col items-center gap-2"><i data-lucide="inbox" class="w-8 h-8 opacity-50"></i>No telemetry records found.</td></tr>`;
                    lucide.createIcons();
                    return; 
                }
                
                container.innerHTML = data.map(c => {
                    const isError = c.type === 'ERROR';
                    const safeNumber = c.number || 'Unknown Number';
                    // Fallback name if contact_name doesn't exist in DB yet
                    const safeName = c.contact_name && c.contact_name !== "Unknown" ? c.contact_name : null;
                    
                    let badgeHtml = '';
                    switch(c.type?.toUpperCase()) {
                        case 'INCOMING': badgeHtml = `<span class="badge badge-incoming"><i data-lucide="arrow-down-left" class="w-3 h-3"></i> Incoming</span>`; break;
                        case 'OUTGOING': badgeHtml = `<span class="badge badge-outgoing"><i data-lucide="arrow-up-right" class="w-3 h-3"></i> Outgoing</span>`; break;
                        case 'MISSED': badgeHtml = `<span class="badge badge-missed"><i data-lucide="phone-missed" class="w-3 h-3"></i> Missed</span>`; break;
                        case 'REJECTED': badgeHtml = `<span class="badge badge-missed"><i data-lucide="phone-off" class="w-3 h-3"></i> Rejected</span>`; break;
                        case 'ERROR': badgeHtml = `<span class="badge badge-error"><i data-lucide="siren" class="w-3 h-3"></i> SYSTEM ERROR</span>`; break;
                        default: badgeHtml = `<span class="badge bg-gray-800 text-gray-300 border border-gray-600">${c.type || 'UNKNOWN'}</span>`;
                    }

                    return `
                    <tr class="table-row-hover transition-colors ${isError ? 'bg-[rgba(248,81,73,0.05)]' : ''}">
                        <td class="py-4 px-6 whitespace-nowrap">
                            ${badgeHtml}
                        </td>
                        <td class="py-4 px-6">
                            <div class="flex flex-col">
                                ${safeName ? `<span class="font-semibold text-white">${safeName}</span>` : ''}
                                <span class="${safeName ? 'text-[var(--text-muted)] text-xs mt-0.5' : 'font-semibold text-white'}">${safeNumber}</span>
                            </div>
                        </td>
                        <td class="py-4 px-6 whitespace-nowrap text-[var(--text-muted)]">
                            ${isError ? '---' : this.formatDuration(c.duration)}
                        </td>
                        <td class="py-4 px-6 whitespace-nowrap text-[var(--text-muted)] text-xs font-mono">
                            ${this.formatDate(c.timestamp)}
                        </td>
                    </tr>`;
                }).join('');
                
                // Re-initialize icons for newly added HTML
                lucide.createIcons();
            }
        }
        
        // Start engine
        const engine = new CallsEngine();
    </script>
</body>
</html>
