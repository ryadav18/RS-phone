<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synchronized Broadcast Center - RS OWNER</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <div class="sidebar glass-panel">
            <div class="sidebar-brand">
                <i data-lucide="shield" style="color: var(--accent-cyan);"></i>
                <span>RS OWNER</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard"><i data-lucide="layout-dashboard"></i> Overview</a></li>
                <li><a href="/permissions"><i data-lucide="shield-check"></i> Permissions</a></li>
                <li class="active"><a href="/notifications"><i data-lucide="bell"></i> Notifications</a></li>
                <li><a href="/files"><i data-lucide="folder-open"></i> Storage</a></li>
                <li><a href="/logs"><i data-lucide="file-text"></i> System Logs</a></li>
            </ul>
        </div>
        <main class="main-content">
            <header class="topbar">
                <h2 style="font-weight: 700;">Realtime Notification Feed</h2>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <button class="primary-btn" id="clear-feed" style="padding: 10px 20px;">Clear Streams</button>
                    <select id="device-select" class="glass-panel" style="background: rgba(0,0,0,0.5); padding: 8px 15px; color: white;"></select>
                </div>
            </header>

            <div class="glass-panel" style="padding: 25px;">
                <div class="list-container" id="notifications-stream">
                    <!-- Dynamic Stream Element Ingestion -->
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('owner_token');
            const activeId = localStorage.getItem('active_device_id');
            if (!activeId) return;

            try {
                const res = await fetch(`/api/notifications?device_id=${activeId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                if (result.status === 'success') {
                    renderStream(result.data);
                }
            } catch (e) {
                console.error(e);
            }

            document.getElementById('clear-feed')?.addEventListener('click', async () => {
                const confirmClear = confirm('Are you sure you want to delete all notification history?');
                if (!confirmClear) return;
                
                try {
                    await fetch('/api/notifications/clear', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ device_id: activeId })
                    });
                    window.location.reload();
                } catch (err) {
                    console.error(err);
                }
            });
        });

        function renderStream(items) {
            const container = document.getElementById('notifications-stream');
            if (!container) return;
            container.innerHTML = '';

            if (items.length === 0) {
                container.innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 40px;">No incoming events currently archived.</div>';
                return;
            }

            items.forEach(n => {
                const el = document.createElement('div');
                el.className = 'list-item';
                el.innerHTML = `
                    <div>
                        <strong style="color: var(--accent-cyan);">${n.app_name}</strong> - ${n.title}
                        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">${n.message}</p>
                    </div>
                    <div style="color: var(--text-muted); font-size: 0.8rem;">${new Date(n.received_at).toLocaleTimeString()}</div>
                `;
                container.appendChild(el);
            });
        }
    </script>
</body>
</html>
