<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS OWNER DASHBOARD - Secure System Authorization Portal</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .toggle-link {
            color: var(--accent-cyan, #00d2ff); 
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .toggle-link:hover {
            text-decoration: underline;
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.5); /* Neon Glow Effect */
        }
        
        /* Stylish Alert Box for Login/Register Errors */
        #auth-alert {
            display: none;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }
        .alert-error {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid #ff3b30;
            color: #ff3b30;
        }
        .alert-success {
            background: rgba(48, 209, 88, 0.1);
            border: 1px solid #30d158;
            color: #30d158;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <h1 style="font-weight: 700; letter-spacing: 1.5px; margin-bottom: 5px;">RS OWNER</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px;" id="auth-subtitle">DEVICE MANAGEMENT CONTROL SYSTEM</p>
            </div>

            <!-- Dynamic Alert Message Box -->
            <div id="auth-alert"></div>

            <!-- 1. LOGIN FORM (Default Visible) -->
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Owner Registered Email</label>
                    <input type="email" id="email" required placeholder="owner@devicemanagement.com">
                </div>
                <div class="form-group">
                    <label for="password">Security Password Key</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="primary-btn">ACCESS SECURE WORKSPACE</button>
                
                <div style="margin-top: 15px; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
                    New to RS Phone? <span class="toggle-link" onclick="toggleAuth('register')">Register here</span>
                </div>
            </form>

            <!-- 2. REGISTRATION FORM (Hidden by Default) -->
            <form id="register-form" style="display: none;">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" required placeholder="System Admin">
                </div>
                <div class="form-group">
                    <label for="reg-email">Owner Email</label>
                    <input type="email" id="reg-email" required placeholder="owner@devicemanagement.com">
                </div>
                <div class="form-group">
                    <label for="reg-password">Security Password Key</label>
                    <input type="password" id="reg-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="primary-btn">REGISTER NEW ACCOUNT</button>
                
                <div style="margin-top: 15px; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
                    Already have an account? <span class="toggle-link" onclick="toggleAuth('login')">Login here</span>
                </div>
            </form>

            <div style="margin-top: 25px; font-size: 0.85rem; color: var(--text-muted); text-align: center;">
                Authorized operations validation protocol. Ensure target nodes connection.
            </div>
        </div>
    </div>

    <!-- UI Toggle Script -->
    <script>
        // Form Smooth Switcher
        function toggleAuth(type) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const subtitle = document.getElementById('auth-subtitle');
            const alertBox = document.getElementById('auth-alert');

            // Hide alert when switching tabs
            alertBox.style.display = 'none';

            if (type === 'register') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                subtitle.innerText = 'CREATE NEW SECURE WORKSPACE';
            } else {
                registerForm.style.display = 'none';
                loginForm.style.display = 'block';
                subtitle.innerText = 'DEVICE MANAGEMENT CONTROL SYSTEM';
            }
        }

        // Global Alert Function (auth.js se call karne ke liye)
        window.showAuthMessage = function(message, isSuccess = false) {
            const alertBox = document.getElementById('auth-alert');
            alertBox.innerText = message;
            alertBox.className = isSuccess ? 'alert-success' : 'alert-error';
            alertBox.style.display = 'block';
        };
    </script>
    
    <!-- Core Authentication Logic -->
    <script src="/static/js/auth.js"></script>
</body>
</html>
