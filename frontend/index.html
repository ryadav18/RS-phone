<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Phone - Secure Portal</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Zero-Lag Base Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #121212; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* Main Container */
        .auth-container { width: 100%; max-width: 420px; background: #1e1e1e; border-top: 4px solid #2980b9; padding: 30px 25px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Header */
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header i { width: 48px; height: 48px; color: #2980b9; margin-bottom: 10px; }
        .auth-header h1 { font-size: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .auth-header p { font-size: 13px; color: #888; text-transform: uppercase; margin-top: 5px; font-weight: 600; }

        /* Flat Inputs */
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; font-size: 12px; color: #aaa; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }
        .input-group input { width: 100%; background: #121212; border: 1px solid #333; color: white; padding: 14px 15px; font-size: 15px; border-radius: 4px; outline: none; transition: border 0.2s; }
        .input-group input:focus { border-color: #2980b9; }
        
        /* Icons in input */
        .toggle-password { position: absolute; right: 15px; top: 35px; color: #666; cursor: pointer; }
        .toggle-password:hover { color: #fff; }

        /* Action Buttons */
        .primary-btn { width: 100%; background: #2980b9; color: white; border: none; padding: 15px; font-size: 15px; font-weight: 700; text-transform: uppercase; border-radius: 4px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: background 0.2s; }
        .primary-btn:hover { background: #21618c; }
        .primary-btn:active { background: #1a5276; }

        /* Helpers & Links */
        .auth-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 13px; color: #aaa; }
        .toggle-link { color: #2980b9; cursor: pointer; text-decoration: none; font-weight: 600; }
        .toggle-link:hover { color: #3498db; text-decoration: underline; }
        .footer-link { text-align: center; font-size: 14px; color: #888; margin-top: 25px; }

        /* Form Switching (Instant, No Lag) */
        .form-hidden { display: none !important; }

        /* Password Strength (Flat Bars) */
        .strength-meter { display: flex; gap: 5px; height: 6px; margin-top: 8px; }
        .strength-segment { flex: 1; background: #333; border-radius: 2px; transition: background 0.2s; }
        .str-weak .seg-1 { background: #e74c3c; }
        .str-med .seg-1, .str-med .seg-2 { background: #f39c12; }
        .str-strong .seg-1, .str-strong .seg-2, .str-strong .seg-3 { background: #2ecc71; }

        /* Error/Success Alerts */
        .alert-box { display: none; padding: 12px 15px; border-radius: 4px; margin-bottom: 20px; font-size: 13px; font-weight: 600; text-align: left; border-left: 4px solid; }
        .alert-error { background: rgba(231, 76, 60, 0.1); border-left-color: #e74c3c; color: #e74c3c; }
        .alert-success { background: rgba(46, 204, 113, 0.1); border-left-color: #2ecc71; color: #2ecc71; }
        .inline-error { color: #e74c3c; font-size: 12px; margin-top: 5px; display: none; font-weight: 600; }

        /* Spinner */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .btn-spinner { animation: spin 1s linear infinite; display: none; }
        
        /* Audit text */
        .audit-text { text-align: center; font-size: 11px; color: #555; margin-top: 30px; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <i data-lucide="shield-check"></i>
            <h1>RS Phone</h1>
            <p id="auth-subtitle">Secure Node Authentication</p>
        </div>

        <div id="auth-alert" class="alert-box"></div>

        <!-- 1. LOGIN FORM -->
        <form id="login-form">
            <div class="input-group">
                <label for="email">Node Email</label>
                <input type="email" id="email" required placeholder="admin@rsphone.com">
            </div>
            
            <div class="input-group">
                <label for="password">Access Key</label>
                <input type="password" id="password" required placeholder="••••••••">
                <i data-lucide="eye" class="toggle-password" onclick="togglePassword('password', this)"></i>
            </div>

            <div class="auth-actions">
                <label style="cursor: pointer;"><input type="checkbox" id="remember-me" style="margin-right: 5px;"> Keep Active</label>
                <span class="toggle-link">Lost Key?</span>
            </div>

            <button type="submit" class="primary-btn" id="login-btn">
                <span class="btn-text">Initialize Connection</span>
                <i data-lucide="loader-2" class="btn-spinner"></i>
            </button>
            
            <div class="footer-link">
                No node registered? <span class="toggle-link" onclick="switchForms('register')">Provision New</span>
            </div>
        </form>

        <!-- 2. REGISTRATION FORM (Hidden by default) -->
        <form id="register-form" class="form-hidden">
            <div class="input-group">
                <label for="reg-name">Administrator Name</label>
                <input type="text" id="reg-name" required placeholder="Admin Root">
            </div>
            
            <div class="input-group">
                <label for="reg-email">Secure Email</label>
                <input type="email" id="reg-email" required placeholder="admin@rsphone.com">
            </div>
            
            <div class="input-group" style="margin-bottom: 10px;">
                <label for="reg-password">Generate Master Key</label>
                <input type="password" id="reg-password" required placeholder="Create strong password">
                <i data-lucide="eye" class="toggle-password" onclick="togglePassword('reg-password', this)"></i>
                <div class="strength-meter" id="strength-meter">
                    <div class="strength-segment seg-1"></div>
                    <div class="strength-segment seg-2"></div>
                    <div class="strength-segment seg-3"></div>
                </div>
            </div>
            
            <div class="input-group">
                <label for="reg-confirm-password">Verify Master Key</label>
                <input type="password" id="reg-confirm-password" required placeholder="Confirm password">
                <div id="match-error" class="inline-error">Keys do not match!</div>
            </div>

            <button type="submit" class="primary-btn" id="register-btn">
                <span class="btn-text">Establish Node</span>
                <i data-lucide="loader-2" class="btn-spinner"></i>
            </button>
            
            <div class="footer-link">
                Existing admin? <span class="toggle-link" onclick="switchForms('login')">Authenticate</span>
            </div>
        </form>

        <div class="audit-text">
            Unauthorized access is strictly prohibited. IP logged.
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Instant Zero-Lag Form Switcher
        function switchForms(target) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const subtitle = document.getElementById('auth-subtitle');
            document.getElementById('auth-alert').style.display = 'none';

            if (target === 'register') {
                loginForm.classList.add('form-hidden');
                registerForm.classList.remove('form-hidden');
                subtitle.innerText = 'Provision New Node';
            } else {
                registerForm.classList.add('form-hidden');
                loginForm.classList.remove('form-hidden');
                subtitle.innerText = 'Secure Node Authentication';
            }
        }

        // Password Visibility Logic
        function togglePassword(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                iconElement.setAttribute("data-lucide", "eye-off");
            } else {
                input.type = "password";
                iconElement.setAttribute("data-lucide", "eye");
            }
            lucide.createIcons();
        }

        // Pro Blocky Strength Meter
        const regPassword = document.getElementById('reg-password');
        const strengthMeter = document.getElementById('strength-meter');
        
        regPassword.addEventListener('input', function() {
            const val = regPassword.value;
            let strength = 0;
            
            if (val.length > 5) strength += 1;
            if (val.match(/[A-Z]/) && val.match(/[0-9]/)) strength += 1;
            if (val.match(/[^a-zA-Z\d]/) && val.length > 7) strength += 1;

            strengthMeter.className = 'strength-meter';
            if (val.length === 0) return;
            if (strength === 1) strengthMeter.classList.add('str-weak');
            else if (strength === 2) strengthMeter.classList.add('str-med');
            else if (strength === 3) strengthMeter.classList.add('str-strong');
        });

        // Instant Password Match Verification
        const confirmPassword = document.getElementById('reg-confirm-password');
        const matchError = document.getElementById('match-error');
        
        confirmPassword.addEventListener('input', function() {
            if (confirmPassword.value !== regPassword.value && confirmPassword.value !== "") {
                matchError.style.display = 'block';
                confirmPassword.style.borderColor = '#e74c3c';
            } else {
                matchError.style.display = 'none';
                confirmPassword.style.borderColor = '#333';
            }
        });

        // Global Hooks for auth.js (Kept intact)
        window.showAuthMessage = function(message, isSuccess = false) {
            const alertBox = document.getElementById('auth-alert');
            alertBox.innerText = message;
            alertBox.className = 'alert-box ' + (isSuccess ? 'alert-success' : 'alert-error');
            alertBox.style.display = 'block';
        };

        window.toggleButtonLoading = function(buttonId, isLoading) {
            const btn = document.getElementById(buttonId);
            const text = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.btn-spinner');
            
            if (isLoading) {
                text.style.display = 'none';
                spinner.style.display = 'block';
                btn.disabled = true;
                btn.style.opacity = '0.7';
                btn.style.cursor = 'not-allowed';
            } else {
                text.style.display = 'block';
                spinner.style.display = 'none';
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.style.cursor = 'pointer';
            }
        };
    </script>
    <!-- Link to your backend Auth logic -->
    <script src="/static/js/auth.js"></script>
</body>
</html>
