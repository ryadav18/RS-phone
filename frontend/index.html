<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS OWNER DASHBOARD - Secure System Authorization Portal</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .toggle-link {
            color: #00d2ff; /* Default cyan color, uses style.css if configured */
            cursor: pointer;
            text-decoration: underline;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <h1 style="font-weight: 700; letter-spacing: 1.5px; margin-bottom: 5px;">RS OWNER</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px;" id="auth-subtitle">DEVICE MANAGEMENT CONTROL SYSTEM</p>
            </div>

            <!-- 1. LOGIN FORM (Default Visible) -->
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Owner Registered Email</label>
                    <input type="email" id="email" required placeholder="owner@devicemanagement.com">
                </div>
                <div class="form-group">
                    <label for="password">Security Password Key</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="primary-btn">ACCESS SECURE WORKSPACE</button>
                
                <div style="margin-top: 15px; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
                    New to RS Phone? <span class="toggle-link" onclick="toggleAuth('register')">Register here</span>
                </div>
            </form>

            <!-- 2. REGISTRATION FORM (Hidden by Default) -->
            <form id="register-form" style="display: none;">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" required placeholder="System Admin">
                </div>
                <div class="form-group">
                    <label for="reg-email">Owner Email</label>
                    <input type="email" id="reg-email" required placeholder="owner@devicemanagement.com">
                </div>
                <div class="form-group">
                    <label for="reg-password">Security Password Key</label>
                    <input type="password" id="reg-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="primary-btn">REGISTER NEW ACCOUNT</button>
                
                <div style="margin-top: 15px; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
                    Already have an account? <span class="toggle-link" onclick="toggleAuth('login')">Login here</span>
                </div>
            </form>

            <div style="margin-top: 25px; font-size: 0.85rem; color: var(--text-muted); text-align: center;">
                Authorized operations validation protocol. Ensure target nodes connection.
            </div>
        </div>
    </div>

    <!-- UI Toggle Script -->
    <script>
        // Yeh function form ko smoothly switch karega
        function toggleAuth(type) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const subtitle = document.getElementById('auth-subtitle');

            if (type === 'register') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                subtitle.innerText = 'CREATE NEW SECURE WORKSPACE';
            } else {
                registerForm.style.display = 'none';
                loginForm.style.display = 'block';
                subtitle.innerText = 'DEVICE MANAGEMENT CONTROL SYSTEM';
            }
        }
    </script>
    
    <!-- Tera main auth.js aakhiri mein load hoga taaki dono forms detect ho sakein -->
    <script src="/static/js/auth.js"></script>
</body>
</html>
