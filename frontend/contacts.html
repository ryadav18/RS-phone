<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address Book & Contacts - RS Phone</title>
    <style>
        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
        }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .header { 
            border-bottom: 1px solid #333; 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* Color updated to match the Green theme of Contacts Engine */
        .header h2 { margin: 0 0 5px 0; color: #27ae60; }
        .header p { margin: 0; color: #aaa; font-size: 0.9em; }
        .back-link { color: #4caf50; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        
        .search-box {
            width: 100%;
            padding: 12px;
            background: #1e1e1e;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .search-box:focus { outline: none; border-color: #27ae60; }

        .contact-card { 
            background: #1e1e1e; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-left: 4px solid #3498db;
        }
        .contact-info { display: flex; flex-direction: column; }
        .contact-name { font-size: 1.1em; font-weight: bold; letter-spacing: 0.5px; }
        .contact-number { color: #aaa; font-size: 0.95em; margin-top: 4px; }
        
        .action-btn {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
            border: 1px solid #3498db;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h2>Live Address Book</h2>
                <p>Synchronized contacts from the target device.</p>
            </div>
            <a href="/dashboard" class="back-link">&larr; Dashboard</a>
        </div>
        
        <!-- Added onkeyup event to trigger the live search filter -->
        <input type="text" id="search-input" class="search-box" placeholder="Search by name or number..." onkeyup="filterContacts()">

        <!-- 🚀 FIX: ID changed from 'contacts-container' to 'contacts-list' -->
        <div id="contacts-list">
            <p id="loading-text" style="color: #888; font-style: italic;">Establishing secure connection... Fetching contacts...</p>
        </div>
    </div>

    <!-- The actual JS Engine that communicates with backend -->
    <script src="/static/js/contacts_engine.js"></script>

    <!-- 🚀 ADDED: Live Search Filter Script -->
    <script>
        function filterContacts() {
            let input = document.getElementById('search-input').value.toLowerCase();
            let list = document.getElementById('contacts-list');
            let items = list.getElementsByTagName('div'); // Gets all contact cards inside the list

            for (let i = 0; i < items.length; i++) {
                // Ensure we only filter contact cards, not the pagination button wrapper
                if (items[i].style.background.includes('rgba')) {
                    let text = items[i].innerText.toLowerCase();
                    if (text.indexOf(input) > -1) {
                        items[i].style.display = "";
                    } else {
                        items[i].style.display = "none";
                    }
                }
            }
        }
    </script>
</body>
</html>
