<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live GPS Tracking - RS OWNER</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet.js Mapping Infrastructure Components Layer -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* =========================================================
           RS PHONE - ZERO-LAG FLAT ARCHITECTURE (INJECTED STYLE)
           ========================================================= */
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-cyan: #00f0ff;
            --color-blue: #3498db;
            --color-green: #2ecc71;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }

        .app-container { display: flex; min-height: 100vh; gap: 20px; }
        .sidebar { width: 260px; background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid #2c2c2e; display: flex; flex-direction: column; gap: 25px; }
        .sidebar-brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 800; letter-spacing: 1px; }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-menu li a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .sidebar-menu li.active a, .sidebar-menu li a:hover { background: rgba(0, 240, 255, 0.08); color: var(--accent-cyan); }
        
        .main-content { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #2c2c2e; }
        .glass-panel { background: var(--bg-card); border: 1px solid #2c2c2e; border-radius: 16px; padding: 25px; height: 75vh; display: flex; flex-direction: column; gap: 15px; }

        /* =========================================================
           GEOLOCATION MAP SPLIT ARCHITECTURE
           ========================================================= */
        .telemetry-bar {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
        }
        .metric-pill {
            background: rgba(255,255,255,0.02); border: 1px solid #2c2c2e;
            padding: 12px 16px; border-radius: 8px; display: flex; flex-direction: column; gap: 4px;
        }
        .metric-label { font-size: 0.75rem; color: var(--text-muted); font-weight: bold; text-transform: uppercase; }
        .metric-value { font-size: 1rem; font-weight: 700; color: #fff; font-family: monospace; }

        /* Map Canvas */
        #map-viewport {
            flex: 1; width: 100%; border-radius: 10px; border: 1px solid #333;
            background: #151515; z-index: 1;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <div class="sidebar-brand">
                <i data-lucide="shield" style="color: var(--accent-cyan);"></i>
                <span>RS OWNER</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard"><i data-lucide="layout-dashboard"></i> Overview</a></li>
                <li><a href="/safety"><i data-lucide="shield-alert"></i> Safety Hub</a></li>
                <li class="active"><a href="/locations"><i data-lucide="map-pin"></i> Live Tracking</a></li>
                <li><a href="/geofence-config"><i data-lucide="locate"></i> Geofencing</a></li>
                <li><a href="/files"><i data-lucide="folder-open"></i> Storage</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h2 style="font-weight: 800; letter-spacing: 1px; text-transform: uppercase;">Live GPS Radar</h2>
                    <p style="color: #666; font-size: 0.85rem; margin-top: 4px;">Continuous telemetry stream tracking current geospatial vectors.</p>
                </div>
                <select id="device-select" style="padding: 10px 14px; border-radius: 6px; background: #1a1a1c; color: white; border: 1px solid #333; cursor: pointer; font-weight: 600;"></select>
            </header>

            <div class="glass-panel">
                <!-- TELEMETRY COUNTERS -->
                <div class="telemetry-bar">
                    <div class="metric-pill">
                        <span class="metric-label">Latitude Vector</span>
                        <span class="metric-value" id="geo-lat">0.000000</span>
                    </div>
                    <div class="metric-pill">
                        <span class="metric-label">Longitude Vector</span>
                        <span class="metric-value" id="geo-lng">0.000000</span>
                    </div>
                    <div class="metric-pill">
                        <span class="metric-label">Last Transmission</span>
                        <span class="metric-value" id="geo-time">NEVER</span>
                    </div>
                </div>

                <!-- DYNAMIC MAP DECK -->
                <div id="map-viewport"></div>
            </div>
        </main>
    </div>

    <script>
        class GeolocationEngine {
            constructor() {
                this.activeDeviceId = localStorage.getItem('active_device_id');
                this.map = null;
                this.marker = null;
                this.init();
            }

            async init() {
                this.initMapFrame();
                await this.loadDevicesList();
                if (!this.activeDeviceId) return;
                
                this.fetchLocation();
                setInterval(() => this.fetchLocation(), 7000); // 7s Loop stream mapping context
            }

            initMapFrame() {
                // Initialize default map point targeting center variables
                this.map = L.map('map-viewport').setView([20.5937, 78.9629], 5);
                
                // Dark Matter Map Tiles Injection Logic
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    maxZoom: 19,
                    attribution: 'RS Security Core Infrastructure'
                }).addTo(this.map);
            }

            async loadDevicesList() {
                const token = localStorage.getItem('owner_token');
                try {
                    const res = await fetch('/api/devices', { headers: { 'Authorization': `Bearer ${token}` } });
                    const result = await res.json();
                    if (result.status === 'success') {
                        const selectEl = document.getElementById('device-select');
                        if (selectEl) {
                            selectEl.innerHTML = ''; 
                            result.data.forEach(dev => {
                                const option = document.createElement('option');
                                option.value = dev.id;
                                option.textContent = dev.name;
                                selectEl.appendChild(option);
                            });

                            if (!this.activeDeviceId && result.data.length > 0) {
                                this.activeDeviceId = result.data[0].id;
                                localStorage.setItem('active_device_id', this.activeDeviceId);
                            }
                            selectEl.value = this.activeDeviceId;
                            selectEl.addEventListener('change', (e) => {
                                this.activeDeviceId = e.target.value;
                                localStorage.setItem('active_device_id', this.activeDeviceId);
                                this.fetchLocation(); 
                            });
                        }
                    }
                } catch (e) { console.error("Device sync block execution broken:", e); }
            }

            async fetchLocation() {
                const token = localStorage.getItem('owner_token');
                if (!this.activeDeviceId) return;

                try {
                    const res = await fetch(`/api/locations?device_id=${this.activeDeviceId}&limit=1`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await res.json();
                    
                    if (result.status === 'success' && result.data && result.data.length > 0) {
                        const loc = result.data[0];
                        this.updateMapTelemetry(loc.latitude, loc.longitude, loc.created_at);
                    }
                } catch (e) { console.error("Map Telemetry Fetch Error:", e); }
            }

            updateMapTelemetry(lat, lng, timestamp) {
                document.getElementById('geo-lat').innerText = lat.toFixed(6);
                document.getElementById('geo-lng').innerText = lng.toFixed(6);
                document.getElementById('geo-time').innerText = new Date(timestamp).toLocaleTimeString('en-IN');

                const targetCoords = [lat, lng];

                if (!this.marker) {
                    this.marker = L.marker(targetCoords).addTo(this.map);
                    this.map.setView(targetCoords, 16);
                } else {
                    this.marker.setLatLng(targetCoords);
                    this.map.panTo(targetCoords);
                }
                this.marker.bindPopup(`<b>Target Node</b><br>Lat: ${lat}<br>Lng: ${lng}`).openPopup();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            new GeolocationEngine();
        });
    </script>
</body>
</html>
