<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live GPS Tracker - RS OWNER</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet.js Mapping Engine (Open-Source, No API Key needed for base map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* =========================================================
           RS PHONE - ZERO-LAG FLAT ARCHITECTURE (INJECTED STYLE)
           ========================================================= */
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-blue: #3498db;
            --color-green: #2ecc71;
            --color-red: #e74c3c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; padding: 15px; }

        /* Sidebar & Layout */
        .app-container { display: flex; min-height: 100vh; gap: 20px; }
        .sidebar { width: 260px; background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid #2c2c2e; display: flex; flex-direction: column; gap: 25px; }
        .sidebar-brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;}
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-menu li a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .sidebar-menu li.active a { background: rgba(52, 152, 219, 0.1); color: var(--accent-blue); border: 1px solid rgba(52, 152, 219, 0.2); }
        
        .main-content { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        
        .topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #2c2c2e; }
        .device-switcher { display: flex; align-items: center; gap: 15px; }
        .sync-badge { font-family: monospace; font-size: 0.8rem; background: rgba(46, 204, 113, 0.1); color: var(--color-green); padding: 6px 12px; border-radius: 4px; border: 1px solid rgba(46, 204, 113, 0.3); font-weight: bold; }
        
        /* Dashboard Layout: Map & Logs */
        .tracking-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; height: 75vh; }
        .glass-panel { background: var(--bg-card); border: 1px solid #2c2c2e; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; }
        
        /* Map Container */
        #map-canvas { flex: 1; border-radius: 12px; border: 1px solid #333; min-height: 400px; background: #111; z-index: 1;}
        
        /* History Log Container */
        .history-list { flex: 1; overflow-y: auto; margin-top: 15px; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        
        .log-card { background: rgba(255,255,255,0.03); border: 1px solid #333; padding: 12px 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 5px; border-left: 3px solid var(--accent-blue); }
        .log-time { font-size: 0.8rem; color: var(--accent-blue); font-family: monospace; font-weight: bold; }
        .log-cords { font-size: 0.85rem; color: #ccc; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-brand"><i data-lucide="shield" style="color: var(--accent-blue);"></i> <span>RS OWNER</span></div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard"><i data-lucide="layout-dashboard"></i> Overview</a></li>
                <li class="active"><a href="/safety"><i data-lucide="map-pin"></i> GPS Radar</a></li>
                <li><a href="/geofence-config"><i data-lucide="focus"></i> Geofence Bounds</a></li>
                <li><a href="/calls"><i data-lucide="phone"></i> Call Logs</a></li>
            </ul>
        </div>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h2 style="font-weight: 800; letter-spacing: 1px; text-transform: uppercase;">Live Target Tracking</h2>
                    <p style="color: #888; font-size: 0.85rem; margin-top: 4px;">Synchronizing continuous satellite telemetry data loops.</p>
                </div>
                <div class="device-switcher">
                    <span class="sync-badge" id="sync-status">📡 RADAR ACTIVE (10s)</span>
                    <select id="device-select" style="padding: 10px 14px; background:#1a1a1c; color:white; border:1px solid #333; border-radius:6px; outline:none; font-weight:600; cursor:pointer;"></select>
                </div>
            </header>

            <div class="tracking-grid">
                <!-- Map View Area -->
                <div class="glass-panel">
                    <h3 style="font-size: 1rem; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase;">Satellite Map Matrix</h3>
                    <div id="map-canvas"></div>
                </div>

                <!-- History Logs Area -->
                <div class="glass-panel">
                    <h3 style="font-size: 1rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase;">Coordinate Log</h3>
                    <div class="history-list" id="location-logs">
                        <div style="text-align: center; padding: 30px; color: #666; font-weight: bold; font-size: 0.9rem;">
                            <i data-lucide="loader" class="lucide-spin" style="margin-bottom: 10px;"></i><br>
                            AWAITING TELEMETRY...
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Tracking Engine Logic -->
    <script>
        class LocationEngine {
            constructor() {
                this.activeDeviceId = localStorage.getItem('active_device_id');
                this.map = null;
                this.marker = null;
                this.syncInterval = null;
                this.init();
            }

            async init() {
                lucide.createIcons();
                this.initMapEngine();
                await this.loadDevices();
                
                if (this.activeDeviceId) {
                    this.startTelemetryLoop();
                }
            }

            // High-Speed OpenStreetMap Implementation
            initMapEngine() {
                // Default coordinates (e.g. Center of India)
                this.map = L.map('map-canvas').setView([20.5937, 78.9629], 5);
                
                // Load Dark/Standard Map Tiles
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors',
                    subdomains: 'abcd',
                    maxZoom: 19
                }).addTo(this.map);

                // Initialize custom marker
                const customIcon = L.divIcon({
                    html: '<div style="background: #3498db; width: 16px; height: 16px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 10px rgba(52, 152, 219, 0.8); animation: pulse 1.5s infinite;"></div>',
                    className: '',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });

                this.marker = L.marker([20.5937, 78.9629], {icon: customIcon}).addTo(this.map);
                
                // Add pulse animation strictly for the marker
                const style = document.createElement('style');
                style.innerHTML = `@keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(52, 152, 219, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(52, 152, 219, 0); } 100% { box-shadow: 0 0 0 0 rgba(52, 152, 219, 0); } }`;
                document.head.appendChild(style);
            }

            async loadDevices() {
                const token = localStorage.getItem('owner_token');
                try {
                    const res = await fetch('/api/devices', { headers: { 'Authorization': `Bearer ${token}` } });
                    const result = await res.json();
                    
                    const selectEl = document.getElementById('device-select');
                    if (result.status === 'success' && result.data.length > 0) {
                        selectEl.innerHTML = '';
                        result.data.forEach(dev => {
                            const option = document.createElement('option');
                            option.value = dev.id;
                            option.textContent = dev.name;
                            selectEl.appendChild(option);
                        });

                        if (!this.activeDeviceId) {
                            this.activeDeviceId = result.data[0].id;
                            localStorage.setItem('active_device_id', this.activeDeviceId);
                        }
                        selectEl.value = this.activeDeviceId;

                        selectEl.addEventListener('change', (e) => {
                            this.activeDeviceId = e.target.value;
                            localStorage.setItem('active_device_id', this.activeDeviceId);
                            this.fetchLocationData(); // Instant sync on switch
                        });
                    }
                } catch (e) {
                    console.error("Device Load Fault:", e);
                }
            }

            startTelemetryLoop() {
                this.fetchLocationData();
                // Har 10 second mein location sync loop chalega
                if (this.syncInterval) clearInterval(this.syncInterval);
                this.syncInterval = setInterval(() => this.fetchLocationData(), 10000);
            }

            async fetchLocationData() {
                const token = localStorage.getItem('owner_token');
                if (!this.activeDeviceId) return;

                const badge = document.getElementById('sync-status');
                badge.style.color = "#f39c12"; // Orange loading state
                badge.innerText = "📡 SYNCING...";

                try {
                    const res = await fetch(`/api/locations?device_id=${this.activeDeviceId}&limit=20`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await res.json();
                    
                    if (result.status === 'success' && result.data.length > 0) {
                        this.updateDashboard(result.data);
                        badge.style.color = "var(--color-green)";
                        badge.innerText = "📡 RADAR ACTIVE (10s)";
                    } else {
                        badge.style.color = "var(--color-red)";
                        badge.innerText = "NO SIGNAL";
                    }
                } catch (e) {
                    console.error("Tracking API Error:", e);
                    badge.style.color = "var(--color-red)";
                    badge.innerText = "LINK FAILED";
                }
            }

            updateDashboard(locations) {
                // 1. Update Map (Pehla record latest hota hai)
                const latest = locations[0];
                if (latest.latitude && latest.longitude) {
                    const latLng = [latest.latitude, latest.longitude];
                    this.marker.setLatLng(latLng);
                    this.map.setView(latLng, 15); // Zoom level 15 (Street level)
                }

                // 2. Update History Panel
                const logsContainer = document.getElementById('location-logs');
                logsContainer.innerHTML = locations.map(loc => {
                    const dateStr = new Date(loc.timestamp || loc.created_at).toLocaleString('en-IN', {
                        day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', second: '2-digit'
                    });
                    
                    return `
                        <div class="log-card">
                            <span class="log-time">${dateStr}</span>
                            <span class="log-cords">LAT: ${parseFloat(loc.latitude).toFixed(5)} <br> LNG: ${parseFloat(loc.longitude).toFixed(5)}</span>
                        </div>
                    `;
                }).join('');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new LocationEngine();
        });
    </script>
</body>
</html>
