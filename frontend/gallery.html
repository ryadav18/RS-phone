<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Media Gallery - RS Phone</title>
    <style>
        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding-bottom: 30px;
        }
        .container { padding: 20px; max-width: 900px; margin: auto; }
        .header { 
            border-bottom: 1px solid #333; 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 { margin: 0 0 5px 0; color: #e91e63; text-transform: uppercase; letter-spacing: 1px; }
        .header p { margin: 0; color: #aaa; font-size: 0.9em; }
        .back-link { color: #4caf50; text-decoration: none; font-weight: bold; padding: 8px 12px; background: rgba(76, 175, 80, 0.2); border-radius: 4px; }
        .back-link:hover { background: rgba(76, 175, 80, 0.4); }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .photo-card { 
            background: #1e1e1e; 
            border-radius: 8px; 
            padding: 15px;
            border: 1px solid #333;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .photo-card:hover { transform: scale(1.02); border-color: #e91e63; }
        
        .file-icon { font-size: 2.5em; text-align: center; margin-bottom: 10px; }
        .file-name { font-weight: bold; font-size: 1em; color: #fff; word-break: break-all; margin-bottom: 5px; }
        .file-meta { color: #aaa; font-size: 0.85em; margin-bottom: 15px; }
        
        .action-btn {
            background: rgba(233, 30, 99, 0.2);
            color: #e91e63;
            border: 1px solid #e91e63;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            width: 100%;
            transition: background 0.3s;
        }
        .action-btn:hover { background: rgba(233, 30, 99, 0.4); }
        
        .view-btn {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            width: 100%;
            display: block;
            text-decoration: none;
        }
        .view-btn:hover { background: rgba(76, 175, 80, 0.4); }

        #loading-text { color: #888; font-style: italic; text-align: center; margin-top: 50px; }
        .empty-state { text-align: center; color: #555; margin-top: 50px; font-size: 1.1em; }

        /* =================================================================================
        /* 🚀 NEW PRODUCTION STYLING: Theme-Compliant Gallery Pagination Block Container
        /* ================================================================================= */
        .pagination-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid #2a2a2a;
        }
        .pagination-btn {
            background: rgba(233, 30, 99, 0.08);
            color: #e91e63;
            border: 1px solid #e91e63;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .pagination-btn:hover:not(:disabled) {
            background: rgba(233, 30, 99, 0.25);
            box-shadow: 0 0 10px rgba(233, 30, 99, 0.2);
        }
        .pagination-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            background: #1a1a1a;
            border-color: #333;
            color: #555;
            box-shadow: none;
        }
        .pagination-indicator {
            font-size: 0.95rem;
            color: #aaa;
            font-weight: bold;
            letter-spacing: 1px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h2>Rolling Media Gallery</h2>
                <!-- 🚀 OPTIMIZATION ATTAINED: Scale descriptor documentation updated to accurately match 50-buffer parameters -->
                <p>Latest 50 synchronized photos (Metadata). Fetch actual file on demand.</p>
            </div>
            <a href="/dashboard" class="back-link">&larr; Dashboard</a>
        </div>
        
        <!-- Target DOM shell where the dynamic 5-sliced gallery elements inject -->
        <div id="gallery-container">
            <p id="loading-text">Establishing secure connection... Fetching metadata...</p>
        </div>

        <!-- 🚀 NEW INTERFACE ELEMENT: Smart Architecture Pagination Control Shell (Target: 5 elements/page) -->
        <div class="pagination-wrapper">
            <button class="pagination-btn" id="gallery-prev-btn" disabled>&larr; Previous</button>
            <span class="pagination-indicator" id="gallery-page-num">PAGE 1 OF 10</span>
            <button class="pagination-btn" id="gallery-next-btn" disabled>Next &rarr;</button>
        </div>
    </div>

    <script src="/static/js/gallery_engine.js"></script>
</body>
</html>
